<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="NINI">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f7f5f0">
<title>NINI 美容顧問系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;font-size:16px;background:#f0ede6;color:#2a2520;height:100dvh;overflow:hidden}
:root{--bg:#faf8f4;--bg2:#f0ede6;--bg3:#e8e3da;--bd:#ddd8ce;--bd2:#c8c2b8;--tx:#2a2520;--tx2:#7a7268;--tx3:#a89e92;--acc:#3d3530;--acc2:#6b5e52;--gold:#b89a6a;--goldb:#f5eed8;--sage:#7a8c7a;--sageb:#eaf0ea;--rose:#9a7a7a;--roseb:#f5eeee;--r:6px;--rl:10px}
.app{display:flex;height:100dvh;overflow:hidden}
.sidebar{width:188px;min-width:188px;background:var(--acc);display:flex;flex-direction:column;z-index:50;transition:transform .25s}
.sb-hd{padding:20px 15px 13px;border-bottom:0.5px solid rgba(255,255,255,.08)}
.sb-brand{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.3);margin-bottom:5px;font-weight:500}
.sb-title{font-size:16px;font-weight:300;color:#fff;letter-spacing:1.5px}
.sb-sub{font-size:10px;color:rgba(255,255,255,.28);margin-top:4px}
.cl-list{flex:1;overflow-y:auto;padding:8px}
.cl-list::-webkit-scrollbar{display:none}
.ci{padding:10px 11px;border-radius:var(--r);cursor:pointer;margin-bottom:2px;border:0.5px solid transparent;transition:all .2s}
.ci:hover{background:rgba(255,255,255,.06)}
.ci.active{background:rgba(255,255,255,.11);border-color:rgba(255,255,255,.12)}
.ci-nm{font-size:14px;color:rgba(255,255,255,.85)}
.ci-sb{font-size:10px;color:rgba(255,255,255,.28);margin-top:3px}
.add-cl{margin:8px;padding:10px;border:0.5px solid rgba(255,255,255,.12);border-radius:var(--r);text-align:center;font-size:11px;color:rgba(255,255,255,.32);cursor:pointer}
.add-cl:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.55)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:0 16px;background:var(--bg);border-bottom:0.5px solid var(--bd);display:flex;align-items:center;gap:10px;height:56px;flex-shrink:0}
.menu-btn{display:none;width:30px;height:30px;border:none;background:none;font-size:18px;color:var(--tx2);cursor:pointer;flex-shrink:0;align-items:center;justify-content:center}
.cl-info{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--acc);color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cl-nm-big{font-size:15px;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cl-tags{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.tag{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:500}
.t-skin{background:var(--goldb);color:var(--gold)}
.t-concern{background:var(--roseb);color:var(--rose)}
.t-season{background:var(--sageb);color:var(--sage)}
.ai-btn{padding:0 16px;height:32px;border:0.5px solid var(--acc);border-radius:20px;font-size:11px;color:var(--acc);background:transparent;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;flex-shrink:0;font-family:inherit;font-weight:500;transition:all .2s}
.ai-btn:hover{background:var(--acc);color:#fff}
.ai-btn:disabled{opacity:.4;cursor:not-allowed}
.tab-bar{display:flex;border-bottom:0.5px solid var(--bd);background:var(--bg);padding:0 12px;flex-shrink:0;overflow-x:auto}
.tab-bar::-webkit-scrollbar{display:none}
.tbtab{padding:0 12px;height:40px;font-size:12px;color:var(--tx3);cursor:pointer;border-bottom:1.5px solid transparent;margin-bottom:-0.5px;white-space:nowrap;display:flex;align-items:center;letter-spacing:.4px}
.tbtab.active{color:var(--acc);border-bottom-color:var(--acc);font-weight:500}
.mc{flex:1;overflow-y:auto;padding:15px 16px;-webkit-overflow-scrolling:touch}
.card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:10px}
.card-bd{padding:14px 15px}
.sec-lb{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-bottom:9px}
.pf-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:0.5px solid var(--bd);gap:8px}
.pf-row:last-child{border-bottom:none}
.pfk{font-size:12px;color:var(--tx3);flex-shrink:0}
.pfv{font-size:13px;font-weight:500;color:var(--tx);text-align:right}
.prod-item{display:flex;align-items:center;gap:9px;padding:9px 15px;border-bottom:0.5px solid var(--bd)}
.prod-item:last-of-type{border-bottom:none}
.prod-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.dot-n{background:var(--gold)}.dot-e{background:var(--tx3)}
.prod-nm{font-size:14px;flex:1;color:var(--tx)}
.prod-brand{font-size:11px;color:var(--tx3)}
.del-x{font-size:18px;color:var(--tx3);cursor:pointer;padding:0 3px;background:none;border:none;line-height:1;flex-shrink:0}
.del-x:hover{color:#a05050}
.add-row{padding:10px 15px;font-size:12px;color:var(--acc2);cursor:pointer;text-align:center;border-top:0.5px solid var(--bd)}
.add-row:hover{background:var(--bg2)}
.pbadge{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:500;flex-shrink:0}
.pb-t{background:var(--roseb);color:var(--rose)}
.pb-s{background:var(--sageb);color:var(--sage)}
.pb-e{background:var(--bg3);color:var(--tx3)}
.pb-new{background:var(--goldb);color:var(--gold)}
.visit-card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);margin-bottom:8px;overflow:hidden}
.visit-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;cursor:pointer;gap:8px;user-select:none}
.visit-hd:hover{background:var(--bg2)}
.v-date{font-size:14px;font-weight:500;color:var(--tx)}
.v-label{font-size:11px;color:var(--tx3);margin-left:7px}
.v-meta{font-size:11px;color:var(--tx3);margin-top:3px}
.visit-body{padding:0 15px 14px;border-top:0.5px solid var(--bd)}
.vsec{margin-top:12px}
.vlb{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.vtxt{font-size:14px;color:var(--tx);line-height:1.7;white-space:pre-wrap}
.chev{font-size:10px;color:var(--tx3);transition:transform .2s;flex-shrink:0}
/* AI 卡片 */
.ai-card{border-radius:var(--rl);overflow:hidden;margin-top:13px;background:#2e2a26}
.ai-top{padding:14px 17px 11px;background:#2e2a26;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.ai-brand-lbl{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.28);font-weight:500;margin-bottom:4px}
.ai-cname{font-size:19px;font-weight:300;color:#fff;letter-spacing:.8px}
.ai-sub{font-size:11px;color:rgba(255,255,255,.32);margin-top:2px}
.save-img-btn{background:rgba(255,255,255,.08);border:0.5px solid rgba(255,255,255,.15);border-radius:20px;padding:6px 12px;font-size:11px;color:rgba(255,255,255,.42);cursor:pointer;font-family:inherit;white-space:nowrap}
.save-img-btn:hover{background:rgba(255,255,255,.14);color:rgba(255,255,255,.7)}
.ai-analysis{background:#3a3530;padding:12px 17px;font-size:13px;color:rgba(255,255,255,.55);line-height:1.8;border-top:0.5px solid rgba(255,255,255,.06)}
.ai-am{background:#b5976a;padding:16px 17px}
.ai-am-hd{display:flex;align-items:center;gap:9px;margin-bottom:14px}
.ai-am-icon{font-size:22px;line-height:1}
.ai-am-title{font-size:13px;font-weight:600;color:#fffdf5;letter-spacing:1.5px}
.ai-am-sub{font-size:10px;color:rgba(255,253,245,.48);margin-top:1px}
.ai-pm{background:#2a3a35;padding:16px 17px}
.ai-pm-hd{display:flex;align-items:center;gap:9px;margin-bottom:14px}
.ai-pm-icon{font-size:22px;line-height:1}
.ai-pm-title{font-size:13px;font-weight:600;color:#e8f0ee;letter-spacing:1.5px}
.ai-pm-sub{font-size:10px;color:rgba(232,240,238,.38);margin-top:1px}
.ai-step{display:flex;align-items:flex-start;gap:11px;margin-bottom:11px}
.ai-step:last-child{margin-bottom:0}
.ai-step-num{width:20px;height:20px;border-radius:50%;border:0.5px solid rgba(255,255,255,.22);color:rgba(255,255,255,.45);font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.ai-step-nm{font-size:15px;font-weight:500;color:#fff;margin-bottom:2px}
.ai-step-hw{font-size:12px;color:rgba(255,255,255,.45);line-height:1.5}
.ai-tips{background:#241f1c;padding:14px 17px}
.ai-tips-lbl{font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,.28);margin-bottom:10px;font-weight:500}
.ai-tip-row{display:flex;align-items:flex-start;gap:9px;margin-bottom:8px}
.ai-tip-row:last-child{margin-bottom:0}
.ai-tip-dot{width:3px;height:3px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:8px}
.ai-tip-txt{font-size:13px;color:rgba(255,255,255,.52);line-height:1.7}
.ai-raw{background:#2e2a26;padding:14px 17px}
.ai-raw-txt{font-size:13px;color:rgba(255,255,255,.58);line-height:1.9;white-space:pre-wrap}
.ai-loading{background:#2e2a26;border-radius:var(--rl);padding:18px 17px;display:flex;align-items:center;gap:9px;margin-top:13px}
.ai-loading-txt{font-size:13px;color:rgba(255,255,255,.42)}
.dots span{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.32);display:inline-block;animation:dp 1.2s infinite}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,80%,100%{opacity:.2}40%{opacity:.8}}
/* AI 編輯 */
.ai-edit-wrap{margin-top:9px;background:var(--bg2);border:0.5px solid var(--bd);border-radius:var(--rl);overflow:hidden;display:none}
.ai-edit-toolbar{padding:8px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--bd);background:var(--bg)}
.ai-edit-lbl{font-size:10px;font-weight:600;color:var(--tx3);letter-spacing:.6px}
.ai-edit-ta{width:100%;padding:12px 13px;font-size:13px;color:var(--tx);background:var(--bg2);border:none;outline:none;font-family:inherit;line-height:1.9;resize:none;min-height:150px}
.ai-btns{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.ab{padding:7px 13px;border-radius:20px;font-size:11px;cursor:pointer;font-family:inherit;border:0.5px solid var(--bd2);color:var(--tx2);background:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation;min-height:36px;-webkit-appearance:none}
.ab:hover{background:var(--bg3)}
.ab.primary{background:var(--acc);color:#fff;border-color:var(--acc)}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(30,25,20,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg);border-radius:14px 14px 0 0;width:100%;max-width:520px;max-height:92dvh;overflow-y:auto;display:flex;flex-direction:column;-webkit-overflow-scrolling:touch}
@media(min-width:640px){.overlay{align-items:center;padding:16px}.modal{border-radius:var(--rl);max-height:88dvh}}
.modal-hd{padding:15px 17px;border-bottom:0.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;background:var(--bg);z-index:1}
.modal-title{font-size:15px;font-weight:500;color:var(--tx)}
.modal-close{font-size:22px;color:var(--tx3);cursor:pointer;background:none;border:none;font-family:inherit;line-height:1;padding:0 3px}
.modal-body{padding:17px;display:flex;flex-direction:column;gap:13px}
.modal-ft{padding:12px 17px;border-top:0.5px solid var(--bd);display:flex;gap:8px;position:sticky;bottom:0;background:var(--bg);padding-bottom:max(12px,env(safe-area-inset-bottom))}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:10px;font-weight:600;color:var(--tx3);letter-spacing:.8px;text-transform:uppercase}
.fg input,.fg select,.fg textarea{padding:10px 12px;border:0.5px solid var(--bd2);border-radius:var(--r);font-size:15px;color:var(--tx);background:var(--bg2);width:100%;font-family:inherit;outline:none;-webkit-appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--acc2);background:var(--bg)}
.fg textarea{resize:none;min-height:70px;line-height:1.6}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:3px}
.chip,.nchip{font-size:13px;padding:8px 15px;border-radius:20px;border:0.5px solid var(--bd2);cursor:pointer;color:var(--tx2);background:var(--bg);user-select:none;-webkit-user-select:none;touch-action:manipulation;display:inline-flex;align-items:center;min-height:36px;-webkit-tap-highlight-color:transparent;font-family:inherit;outline:none;-webkit-appearance:none}
.chip.on,.nchip.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.btn-sv{flex:1;padding:12px;background:var(--acc);border:none;border-radius:var(--r);font-size:14px;font-weight:500;color:#fff;cursor:pointer;font-family:inherit}
.btn-sv:hover{background:var(--acc2)}
.btn-cn{padding:12px 16px;border:0.5px solid var(--bd2);border-radius:var(--r);font-size:14px;color:var(--tx2);cursor:pointer;background:none;font-family:inherit}
.btn-cn:hover{background:var(--bg2)}
.btn-del{padding:12px 14px;border:0.5px solid #d4aaaa;border-radius:var(--r);font-size:14px;color:#8a4040;cursor:pointer;background:#f8eded;font-family:inherit}
.hint{font-size:11px;color:var(--tx3);line-height:1.5}
.btn-ol{width:100%;padding:11px;border:0.5px solid var(--bd2);border-radius:var(--r);font-size:13px;color:var(--tx2);cursor:pointer;background:none;font-family:inherit;margin-top:6px;display:block;text-align:center}
.btn-ol:hover{background:var(--bg2)}
.btn-rdol{width:100%;padding:11px;border:0.5px solid #d4aaaa;border-radius:var(--r);font-size:13px;color:#8a4040;cursor:pointer;background:none;font-family:inherit;margin-top:6px;display:block;text-align:center}
.scan-zone{border:1.5px dashed var(--bd2);border-radius:var(--r);padding:18px;text-align:center;cursor:pointer;background:var(--bg2)}
.scan-zone:hover{background:var(--bg3)}
.or-div{display:flex;align-items:center;gap:9px;margin:4px 0}
.or-line{flex:1;height:0.5px;background:var(--bd)}
.or-t{font-size:11px;color:var(--tx3)}
.empty-st{text-align:center;padding:30px 16px;font-size:13px;color:var(--tx3);line-height:1.9}
.info-box{background:var(--bg2);border-radius:var(--r);padding:9px 12px;font-size:12px;color:var(--tx2);line-height:1.6}
.gen-btn{width:100%;height:44px;border:0.5px solid var(--bd2);border-radius:var(--r);font-size:13px;color:var(--acc2);background:none;cursor:pointer;font-family:inherit;margin-top:11px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;-webkit-appearance:none}
.gen-btn:hover{background:var(--bg2)}
.key-row{display:flex;gap:7px}
.key-in{flex:1;padding:10px 11px;border:0.5px solid var(--bd2);border-radius:var(--r);font-size:13px;color:var(--tx);background:var(--bg2);font-family:monospace;outline:none}
.key-btn{padding:10px 14px;background:var(--acc);border:none;border-radius:var(--r);font-size:12px;font-weight:500;color:#fff;cursor:pointer;font-family:inherit;white-space:nowrap}
@media(max-width:640px){
  .sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%);box-shadow:4px 0 24px rgba(0,0,0,.25)}
  .sidebar.open{transform:translateX(0)}
  .menu-btn{display:flex}
  .f2{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sb-hd">
      <div class="sb-brand">BEAUTY ADVISOR</div>
      <div class="sb-title">NINI</div>
      <div class="sb-sub" id="cl-count"></div>
    </div>
    <div class="cl-list" id="cl-list"></div>
    <div class="add-cl" id="add-cl-btn">+ 新增客戶</div>
  </div>
  <div class="main">
    <div class="topbar">
      <button class="menu-btn" id="menu-btn">☰</button>
      <div class="cl-info">
        <div class="avatar" id="av"></div>
        <div style="min-width:0">
          <div class="cl-nm-big" id="cl-nm"></div>
          <div class="cl-tags" id="cl-tags"></div>
        </div>
      </div>
      <button class="ai-btn" id="ai-btn">✦ 生成建議</button>
    </div>
    <div class="tab-bar">
      <div class="tbtab active" id="tab-profile">客戶資料</div>
      <div class="tbtab" id="tab-visits">諮詢紀錄</div>
      <div class="tbtab" id="tab-settings">設定</div>
    </div>
    <div class="mc" id="mc"></div>
  </div>
  <div id="sb-mask" style="display:none;position:fixed;inset:0;z-index:49;background:rgba(0,0,0,.3)"></div>
  <div id="mw"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>

var EXT_TYPES = ['乳液/乳霜','眼霜','防曬','卸妝','洗面乳','化妝水','精華','其他'];

// ── 工具函數 ──
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function today() {
  return new Date().toLocaleDateString('zh-TW', {year:'numeric',month:'2-digit',day:'2-digit'});
}
function toISO(s) {
  try { return new Date(s.replace(/\//g,'-')).toISOString().slice(0,10); } catch(e) { return new Date().toISOString().slice(0,10); }
}
function skinLabel(c) {
  return (c.skinTypes || (c.skin ? [c.skin] : ['一般肌'])).join('・');
}
function saveData() {
  try { localStorage.setItem('nini_v9', JSON.stringify(clients)); } catch(e) {}
}
function saveApiKey(k) {
  apiKey = k.trim();
  localStorage.setItem('nini_apikey', apiKey);
}
function nextId() {
  var max = 0;
  for (var i = 0; i < clients.length; i++) { if (clients[i].id > max) max = clients[i].id; }
  return max + 1;
}
function h(tag, attrs, inner) {
  var a = '';
  for (var k in attrs) a += ' ' + k + '="' + attrs[k] + '"';
  return '<' + tag + a + '>' + (inner || '') + '</' + tag + '>';
}
// chip 建立（避免巢狀引號）
function makeChip(label, active, extraCls) {
  var cls = (extraCls || 'chip') + (active ? ' on' : '');
  var el = document.createElement('button');
  el.type = 'button';
  el.className = cls;
  el.textContent = label;
  // 同時綁 click 和 touchend，確保 iOS 也能觸發
  el.addEventListener('click', function(e) {
    e.preventDefault();
    this.classList.toggle('on');
  });
  el.addEventListener('touchend', function(e) {
    e.preventDefault();
    this.classList.toggle('on');
  });
  return el;
}

// ── 載入 ──
function loadData() {
  try {
    var s = localStorage.getItem('nini_v9');
    clients = s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULTS));
  } catch(e) { clients = JSON.parse(JSON.stringify(DEFAULTS)); }
  for (var i = 0; i < clients.length; i++) {
    if (!clients[i].visits) clients[i].visits = [];
    if (!clients[i].skinTypes) clients[i].skinTypes = clients[i].skin ? [clients[i].skin] : ['一般肌'];
  }
  cur = clients[0];
  apiKey = localStorage.getItem('nini_apikey') || '';
}

// ── buildAICard ──
function buildAICard(raw, name, date, season, idx) {
  var lines = raw.split('\n');
  var amSteps = [], pmSteps = [], tips = [], analysis = [];
  var sec = '';
  for (var li = 0; li < lines.length; li++) {
    var line = lines[li].trim();
    if (!line) continue;
    if (/^一[、.．:：]|膚況簡析|膚況分析/.test(line)) {
      sec = 'analysis';
      var txt = line.replace(/^一[、.．:：]\s*/, '').replace(/膚況(簡析|分析)[：:]\s*/, '').trim();
      if (txt) analysis.push(txt);
    } else if (/^二[、.．:：]|保養步驟/.test(line)) { sec = 'steps'; }
    else if (/^三[、.．:：]|特別提醒|提醒$/.test(line)) { sec = 'tips'; }
    else if (sec === 'analysis') { analysis.push(line); }
    else if (sec === 'steps') {
      var isBoth = /^早晚\s*[｜|]/.test(line);
      var isAm = !isBoth && /^早\s*[｜|]/.test(line);
      var isPm = !isBoth && /^晚\s*[｜|]/.test(line);
      if (isBoth) { amSteps.push(line); pmSteps.push(line); }
      else if (isAm) amSteps.push(line);
      else if (isPm) pmSteps.push(line);
    } else if (sec === 'tips') {
      tips.push(line.replace(/^[-·・•]\s*/, '').replace(/^\d+[.．、]\s*/, ''));
    }
  }
  var hasSteps = amSteps.length || pmSteps.length;
  function parseStep(s, si) {
    var clean = s.replace(/^(早晚|早|晚)\s*[｜|]\s*/, '').replace(/^\d+[.．、]\s*/, '').replace(/^[-·・]\s*/, '');
    var sep = clean.search(/[—－：:]/);
    var nm = sep > 0 ? clean.slice(0, sep).trim() : clean;
    var hw = sep > 0 ? clean.slice(sep + 1).trim() : '';
    return '<div class="ai-step"><div class="ai-step-num">' + (si + 1) + '</div><div><div class="ai-step-nm">' + esc(nm) + '</div>' + (hw ? '<div class="ai-step-hw">' + esc(hw) + '</div>' : '') + '</div></div>';
  }
  var out = '<div class="ai-card" id="ai-card-' + idx + '">';
  out += '<div class="ai-top"><div><div class="ai-brand-lbl">NINI · AI 諮詢建議</div><div class="ai-cname">' + esc(name) + '</div><div class="ai-sub">' + esc(date) + ' · ' + esc(season) + '</div></div></div>';
  if (analysis.length) out += '<div class="ai-analysis">' + analysis.map(function(a){return esc(a);}).join('<br>') + '</div>';
  if (amSteps.length) {
    out += '<div class="ai-am"><div class="ai-am-hd"><div class="ai-am-icon">🌤</div><div><div class="ai-am-title">日間保養</div><div class="ai-am-sub">早晨使用</div></div></div>';
    for (var si = 0; si < amSteps.length; si++) out += parseStep(amSteps[si], si);
    out += '</div>';
  }
  if (pmSteps.length) {
    out += '<div class="ai-pm"><div class="ai-pm-hd"><div class="ai-pm-icon">🌙</div><div><div class="ai-pm-title">夜間保養</div><div class="ai-pm-sub">睡前使用</div></div></div>';
    for (var si = 0; si < pmSteps.length; si++) out += parseStep(pmSteps[si], si);
    out += '</div>';
  }
  if (tips.length) {
    out += '<div class="ai-tips"><div class="ai-tips-lbl">本次特別提醒</div>';
    for (var ti = 0; ti < tips.length; ti++) out += '<div class="ai-tip-row"><div class="ai-tip-dot"></div><div class="ai-tip-txt">' + esc(tips[ti]) + '</div></div>';
    out += '</div>';
  }
  if (!hasSteps) out += '<div class="ai-raw"><div class="ai-raw-txt">' + esc(raw) + '</div></div>';
  out += '</div>';
  return out;
}

// ── 儲存圖片 ──
function saveAsImage(visitIdx) {
  var el = document.getElementById('ai-card-' + visitIdx);
  if (!el) { alert('找不到建議卡片'); return; }
  html2canvas(el, {backgroundColor:'#2e2a26', scale:2, logging:false, useCORS:true}).then(function(canvas) {
    var link = document.createElement('a');
    var v = cur.visits[visitIdx];
    link.download = 'NINI_' + cur.name + '_' + (v ? v.date : today()) + '.png';
    link.href = canvas.toDataURL('image/png'); link.click();
  }).catch(function(e) { alert('圖片儲存失敗：' + e.message); });
}

// ── AI 建議 ──
function promptAI() {
  if (!apiKey) { alert('請先在「設定」頁面設定 API Key'); switchTab('settings'); return; }
  var vs = cur.visits || [];
  if (!vs.length) {
    if (confirm('目前沒有諮詢紀錄，要先新增嗎？')) { switchTab('visits'); openVisitModal(null); }
    return;
  }
  var latestIdx = vs.length - 1;
  if (vs[latestIdx].aiResult) {
    if (!confirm('最新紀錄已有 AI 建議，要重新生成嗎？')) return;
    vs[latestIdx].aiResult = ''; saveData();
  }
  switchTab('visits'); runAI(latestIdx);
}

function runAI(visitIdx) {
  if (!apiKey) { alert('請先設定 API Key'); return; }
  var v = cur.visits[visitIdx];
  if (!v) return;
  var btn = document.getElementById('ai-btn');
  if (btn) { btn.disabled = true; btn.textContent = '生成中...'; }
  renderVisits();
  setTimeout(function() { toggleVisit(visitIdx); }, 50);
  var prevV = visitIdx > 0 ? cur.visits[visitIdx - 1] : null;
  var hist = prevV ? ('上次諮詢（' + prevV.date + '，' + prevV.season + '）：膚況「' + (prevV.skinStatus || '無') + '」，反應「' + (prevV.reaction || '無') + '」。') : '這是首次諮詢。';
  var usedNini = (v.niniUsed && v.niniUsed.length) ? v.niniUsed : cur.nini;
  var usedExt = v.extUsed || cur.ext.map(function(e){ return e.name + (e.brand ? ' (' + e.brand + ')' : ''); }).join('、');
  var bought = (v.purchased && v.purchased.length) ? '本次新購買：' + v.purchased.join('、') + '。' : '';
  var prompt = '你是 NINI 品牌的美容諮詢師，請用繁體中文、專業但親切的語氣撰寫保養建議。\n\n'
    + '【客戶資料】\n姓名：' + cur.name + '，' + cur.age + '歲\n膚質：' + skinLabel(cur) + '\n主要困擾：' + cur.concerns.join('、') + '\n當前季節：' + cur.season + '\n歷史參考：' + hist + '\n\n'
    + '【本次紀錄】' + v.date + '，' + v.season + '\n【當次膚況】' + (v.skinStatus || '無特別描述') + '\n【手邊 Zero 產品】' + (usedNini.join('、') || '無') + '\n【其他產品】' + (usedExt || '無') + '\n' + bought + '\n\n'
    + '請依以下規則輸出保養建議：\n\n'
    + '一、膚況簡析：（2句，不使用「你」「妳」等稱謂，直接描述膚況狀態）\n\n'
    + '二、保養步驟：\n保養順序：純露 → 原液（功效型優先，保濕型其次）→ 其他精華 → 乳液/乳霜（鎖水） → 防曬（早晨最後）\n乳液/乳霜永遠在所有原液之後；EGF、生長因子等功效原液在一般保濕原液之前。\n從手邊產品選：純露 1-2 種，原液 2-3 種，其他依序納入。\n每步驟格式（嚴格一行一步）：\n早 ｜ 產品名 — 用法\n晚 ｜ 產品名 — 用法\n早晚 ｜ 產品名 — 用法\n塗抹保養品用「按壓」，不用「輕拍」；純露濕敷說「濕敷 3-5 分鐘」，否則說「噴灑全臉」；不使用「你」「妳」；用法不超過20字。\n\n'
    + '三、特別提醒：（2條，以 · 開頭，不使用稱謂）\n\n請嚴格遵守格式。';
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'content-type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body: JSON.stringify({model:API_MODEL, max_tokens:900, messages:[{role:'user', content:prompt}]})
  }).then(function(res) {
    return res.json().then(function(data) {
      if (!res.ok) throw new Error((data.error && data.error.message) || 'HTTP ' + res.status);
      return data;
    });
  }).then(function(data) {
    cur.visits[visitIdx].aiResult = data.content && data.content[0] ? data.content[0].text : '無法生成建議';
    if (v.purchased && v.purchased.length) {
      v.purchased.forEach(function(p) { if (cur.nini.indexOf(p) === -1) cur.nini.push(p); });
    }
    saveData();
    if (btn) { btn.disabled = false; btn.innerHTML = '✦ 生成建議'; }
    renderVisits();
    setTimeout(function() { toggleVisit(visitIdx); }, 80);
  }).catch(function(e) {
    var msg = e.message || '未知錯誤';
    if (msg.indexOf('credit') >= 0 || msg.indexOf('billing') >= 0) msg = '帳號點數不足，請到 console.anthropic.com 儲值';
    else if (msg.indexOf('401') >= 0) msg = 'API Key 無效，請重新設定';
    else if (msg.indexOf('429') >= 0) msg = '請求太頻繁，請稍候再試';
    cur.visits[visitIdx].aiResult = '[錯誤] ' + msg;
    saveData();
    if (btn) { btn.disabled = false; btn.innerHTML = '✦ 生成建議'; }
    renderVisits();
    setTimeout(function() { toggleVisit(visitIdx); }, 80);
  });
}

function saveVisit(idx, modal) {
  if (!cur.visits) cur.visits = [];
  var dateVal = modal.querySelector('#v-date').value;
  var dateStr = dateVal ? new Date(dateVal).toLocaleDateString('zh-TW', {year:'numeric',month:'2-digit',day:'2-digit'}) : today();
  var niniUsed = [], purchased = [];
  modal.querySelectorAll('#v-nini-chips .nchip.on').forEach(function(c) { niniUsed.push(c.textContent); });
  modal.querySelectorAll('#v-purch-chips .nchip.on').forEach(function(c) { purchased.push(c.textContent); });
  var existingAI = (idx !== null && cur.visits[idx]) ? (cur.visits[idx].aiResult || '') : '';
  var vObj = {
    date: dateStr, season: modal.querySelector('#v-season').value,
    label: modal.querySelector('#v-label').value.trim() || '諮詢紀錄',
    skinStatus: modal.querySelector('#v-skin').value.trim(),
    niniUsed: niniUsed, extUsed: modal.querySelector('#v-ext').value.trim(),
    purchased: purchased, reaction: modal.querySelector('#v-reaction').value.trim(),
    note: modal.querySelector('#v-note').value.trim(), aiResult: existingAI
  };
  purchased.forEach(function(p) { if (cur.nini.indexOf(p) === -1) cur.nini.push(p); });
  if (idx !== null && !isNaN(parseInt(idx)) && parseInt(idx) >= 0) { cur.visits[parseInt(idx)] = vObj; }
  else { cur.visits.push(vObj); }
  saveData(); closeModal(); renderVisits();
}

function exportData() {
  var data = {version:'nini_v9', exportDate:today(), clients:clients};
  var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  var link = document.createElement('a');
  link.download = 'NINI_備份_' + today().replace(/\//g,'-') + '.json';

function importData(input) {
  if (!input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      var imported = data.clients || data;
      if (!Array.isArray(imported)) { alert('檔案格式錯誤'); return; }
      if (!confirm('確定匯入？這會覆蓋目前所有客戶資料（共 ' + imported.length + ' 位）。')) return;
      clients = imported;
      clients.forEach(function(c) {
        if (!c.visits) c.visits = [];
        if (!c.skinTypes) c.skinTypes = c.skin ? [c.skin] : ['一般肌'];
      });
      cur = clients[0]; saveData(); renderSB(); renderTop(); renderTab('profile');
      alert('✓ 匯入成功！共 ' + clients.length + ' 位客戶資料已還原。');
    } catch(err) { alert('匯入失敗：' + err.message); }
  };
  reader.readAsText(input.files[0]);
  input.value = '';
}
function testAPI() {
  if (!apiKey) { alert('請先輸入 API Key'); return; }
  fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'content-type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body: JSON.stringify({model:API_MODEL, max_tokens:20, messages:[{role:'user',content:'請回覆「連線成功」'}]})
  }).then(function(res) {
    return res.json().then(function(data) { return {ok:res.ok, status:res.status, data:data}; });
  }).then(function(r) {
    if (r.ok) alert('✅ 連線成功\n' + (r.data.content && r.data.content[0] ? r.data.content[0].text : ''));
    else alert('❌ 失敗 HTTP ' + r.status + '\n' + ((r.data.error && r.data.error.message) || ''));
  }).catch(function(e) { alert('❌ 連線異常：' + e.message); });
}

function saveClient(id, modal) {
  var name = modal.querySelector('#m-name').value.trim();
  if (!name) { alert('請輸入姓名'); return; }
  var skinTypes = [];
  modal.querySelectorAll('#m-skin-chips .chip.on').forEach(function(c) { skinTypes.push(c.textContent); });
  if (!skinTypes.length) { alert('請選擇至少一種膚質'); return; }
  var concerns = [];
  modal.querySelectorAll('#m-concern-chips .chip.on').forEach(function(c) { concerns.push(c.textContent); });
  var d = {name:name, age:modal.querySelector('#m-age').value, job:modal.querySelector('#m-job').value, skinTypes:skinTypes, concerns:concerns, season:modal.querySelector('#m-season').value, note:modal.querySelector('#m-note').value};
  var numId = parseInt(id);
  if (!isNaN(numId) && numId > 0) {
    for (var i = 0; i < clients.length; i++) {
      if (clients[i].id === numId) { for (var k in d) clients[i][k] = d[k]; cur = clients[i]; break; }
    }
  } else {
    var nc = {id:nextId(), nini:[], ext:[], visits:[]};
    for (var k in d) nc[k] = d[k];
    clients.push(nc); cur = nc;
  }
  saveData(); closeModal(); renderSB(); renderTop(); renderTab(curTab);
}
function deleteClient() {
  if (!confirm('確定刪除「' + cur.name + '」？')) return;
  clients = clients.filter(function(c) { return c.id !== cur.id; });
  if (!clients.length) clients = JSON.parse(JSON.stringify(DEFAULTS));
  cur = clients[0]; saveData(); closeModal(); renderSB(); renderTop(); renderTab('profile');
}

  for (var i = 0; i < EXT_TYPES.length; i++) extHtml += '<option>' + esc(EXT_TYPES[i]) + '</option>';
  extHtml += '</select>';
  var scanSection = apiKey ? '<div class="scan-zone" id="scan-zone"><div style="font-size:24px;margin-bottom:5px">📷</div><div style="font-size:13px;font-weight:500;color:var(--tx);margin-bottom:3px">拍照辨識產品包裝</div><div class="hint">點擊拍照，AI 自動辨識品名</div></div><input type="file" id="photo-inp" accept="image/*" capture="environment" style="display:none"><div id="photo-prev" style="display:none;margin-top:8px"><img id="photo-img" style="width:100%;border-radius:var(--r);margin-bottom:8px;max-height:160px;object-fit:contain"><button id="analyze-btn" class="btn-sv" style="width:100%;margin-bottom:6px">✦ 辨識這張照片</button><div id="photo-status" style="font-size:12px;text-align:center;color:var(--tx2)"></div></div><div class="or-div"><div class="or-line"></div><div class="or-t">或手動輸入</div><div class="or-line"></div></div>' : '';
  var html = '<div class="modal-hd"><span class="modal-title">新增其他產品</span><button id="ae-close" class="modal-close">×</button></div><div class="modal-body">' + scanSection + '<div class="fg"><label>產品名稱</label><input id="e-name" placeholder="ex. Advanced Night Repair 眼霜"></div><div class="f2"><div class="fg"><label>品牌</label><input id="e-brand" placeholder="ex. Estée Lauder"></div><div class="fg"><label>類型</label>' + extHtml + '</div></div></div><div class="modal-ft"><button id="ae-cancel" class="btn-cn">取消</button><button id="ae-save" class="btn-sv">新增</button></div>';
  openModal(html, function(modal) {
    modal.querySelector('#ae-close').addEventListener('click', closeModal);
    modal.querySelector('#ae-cancel').addEventListener('click', closeModal);
    if (apiKey) {
      modal.querySelector('#scan-zone').addEventListener('click', function() { modal.querySelector('#photo-inp').click(); });
      modal.querySelector('#photo-inp').addEventListener('change', function() { onPhoto(this, modal); });
      modal.querySelector('#analyze-btn').addEventListener('click', function() { analyzePhoto(modal); });
    }
    modal.querySelector('#ae-save').addEventListener('click', function() {
      var name = modal.querySelector('#e-name').value.trim();
      if (!name) { alert('請輸入產品名稱'); return; }
      cur.ext.push({name:name, brand:modal.querySelector('#e-brand').value, type:modal.querySelector('#e-type').value});
      saveData(); closeModal(); renderProfile();
    });
  });
}
function onPhoto(inp, modal) {
  if (!inp.files || !inp.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    photoB64 = e.target.result.split(',')[1];
    photoMime = inp.files[0].type || 'image/jpeg';
    var prev = modal.querySelector('#photo-prev');
    if (prev) { prev.style.display = 'block'; modal.querySelector('#photo-img').src = e.target.result; }
  };
  reader.readAsDataURL(inp.files[0]);
}
function analyzePhoto(modal) {
  var status = modal.querySelector('#photo-status');
  if (!photoB64) { status.textContent = '請先拍照'; return; }
  status.textContent = '辨識中...';
  fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'content-type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body: JSON.stringify({model:API_MODEL, max_tokens:120, messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:photoMime,data:photoB64}},{type:'text',text:'保養品包裝，只回傳JSON：{"name":"產品名","brand":"品牌","type":"乳液/乳霜或眼霜或防曬或卸妝或洗面乳或化妝水或精華或其他"}'}]}]})
  }).then(function(res) { return res.json(); }).then(function(data) {
    var txt = data.content && data.content[0] ? data.content[0].text : '';
    var json = JSON.parse(txt.replace(/```json|```/g,'').trim());
    modal.querySelector('#e-name').value = json.name || '';
    modal.querySelector('#e-brand').value = json.brand || '';
    var te = modal.querySelector('#e-type');
    for (var i = 0; i < te.options.length; i++) { if (te.options[i].value === json.type) { te.selectedIndex = i; break; } }
    status.textContent = '✓ 辨識完成';
    status.style.color = 'var(--sage)';
  }).catch(function(e) { status.textContent = '辨識失敗：' + e.message; status.style.color = 'var(--rose)'; });
}

// ── Modal 工具 ──
function openModal(html, callback) {
  var mw = document.getElementById('mw');
  var overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal(); });
  var modal = document.createElement('div');
  modal.className = 'modal';
  modal.addEventListener('click', function(e) { e.stopPropagation(); });
  modal.innerHTML = html;
  overlay.appendChild(modal);
  mw.innerHTML = '';
  mw.appendChild(overlay);
  if (callback) callback(modal);
}
function closeModal() { document.getElementById('mw').innerHTML = ''; }

// ── 初始化 ──
loadData();
document.getElementById('menu-btn').addEventListener('click', toggleSB);
document.getElementById('sb-mask').addEventListener('click', toggleSB);
document.getElementById('add-cl-btn').addEventListener('click', openAddClient);
document.getElementById('ai-btn').addEventListener('click', promptAI);
document.getElementById('tab-profile').addEventListener('click', function() { switchTab('profile'); });
document.getElementById('tab-visits').addEventListener('click', function() { switchTab('visits'); });
document.getElementById('tab-settings').addEventListener('click', function() { switchTab('settings'); });
renderSB(); renderTop(); renderTab('profile');
</script>
