<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="NINI">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f7f5f0">
<title>NINI 美容顧問系統 v10</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;font-size:16px;background:#f0ede6;color:#2a2520;height:100dvh;overflow:hidden}
:root{--bg:#faf8f4;--bg2:#f0ede6;--bg3:#e8e3da;--bd:#ddd8ce;--bd2:#c8c2b8;--tx:#2a2520;--tx2:#7a7268;--tx3:#a89e92;--acc:#3d3530;--acc2:#6b5e52;--gold:#b89a6a;--goldb:#f5eed8;--sage:#7a8c7a;--sageb:#eaf0ea;--rose:#9a7a7a;--roseb:#f5eeee;--heal:#7b6ea8;--healb:#f0eef8;--heald:#5a4e7e;--r:6px;--rl:10px}
/* Layout */
.app{display:flex;height:100dvh;overflow:hidden}
.sidebar{width:188px;min-width:188px;background:var(--acc);display:flex;flex-direction:column;z-index:50;transition:transform .25s}
.sb-hd{padding:20px 15px 13px;border-bottom:0.5px solid rgba(255,255,255,.08)}
.sb-brand{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.3);margin-bottom:5px;font-weight:500}
.sb-title{font-size:16px;font-weight:300;color:#fff;letter-spacing:1.5px}
.sb-sub{font-size:10px;color:rgba(255,255,255,.28);margin-top:4px}
.cl-list{flex:1;overflow-y:auto;padding:8px}.cl-list::-webkit-scrollbar{display:none}
.ci{padding:10px 11px;border-radius:var(--r);cursor:pointer;margin-bottom:2px;border:0.5px solid transparent;transition:all .2s}
.ci:hover{background:rgba(255,255,255,.06)}.ci.active{background:rgba(255,255,255,.11);border-color:rgba(255,255,255,.12)}
.ci-nm{font-size:14px;color:rgba(255,255,255,.85)}.ci-sb{font-size:10px;color:rgba(255,255,255,.28);margin-top:3px}
.add-cl{margin:8px;padding:10px;border:0.5px solid rgba(255,255,255,.12);border-radius:var(--r);text-align:center;font-size:11px;color:rgba(255,255,255,.32);cursor:pointer}
.add-cl:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.55)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
/* Topbar */
.topbar{padding:0 16px;background:var(--bg);border-bottom:0.5px solid var(--bd);display:flex;align-items:center;gap:10px;height:56px;flex-shrink:0}
.menu-btn{display:none;width:30px;height:30px;border:none;background:none;font-size:18px;color:var(--tx2);cursor:pointer;flex-shrink:0;align-items:center;justify-content:center}
.cl-info{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--acc);color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cl-nm-big{font-size:15px;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cl-tags{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.tag{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:500}
.t-skin{background:var(--goldb);color:var(--gold)}.t-concern{background:var(--roseb);color:var(--rose)}.t-season{background:var(--sageb);color:var(--sage)}
.topbar-btns{display:flex;gap:6px;flex-shrink:0}
.tb-btn{padding:0 12px;height:32px;border:0.5px solid var(--acc);border-radius:20px;font-size:11px;color:var(--acc);background:transparent;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;font-family:inherit;font-weight:500;transition:all .2s}
.tb-btn:hover{background:var(--acc);color:#fff}.tb-btn:disabled{opacity:.4;cursor:not-allowed}
.tb-btn.timer-active{background:var(--acc);color:#fff}
/* Timer */
.timer-panel{position:fixed;top:64px;right:16px;background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:16px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:100;display:none;min-width:190px}
.timer-panel.open{display:block}
.timer-time{font-size:32px;font-weight:300;color:var(--tx);letter-spacing:3px;text-align:center;font-variant-numeric:tabular-nums;margin-bottom:4px}
.timer-time.warn{color:var(--gold)}.timer-time.danger{color:var(--rose)}
.timer-lbl{font-size:10px;color:var(--tx3);text-align:center;margin-bottom:10px}
.timer-presets{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;justify-content:center}
.t-preset{padding:4px 10px;border:0.5px solid var(--bd2);border-radius:20px;font-size:11px;color:var(--tx2);cursor:pointer;background:none;font-family:inherit}
.t-preset:hover,.t-preset.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.timer-btns{display:flex;gap:6px}
.t-ctrl{flex:1;padding:8px;border:0.5px solid var(--bd2);border-radius:var(--r);font-size:12px;color:var(--tx2);cursor:pointer;background:none;font-family:inherit;text-align:center}
.t-ctrl.go{background:var(--acc);color:#fff;border-color:var(--acc)}
.t-ctrl:hover{background:var(--bg2)}.t-ctrl.go:hover{background:var(--acc2)}
/* Tabs */
.tab-bar{display:flex;border-bottom:0.5px solid var(--bd);background:var(--bg);padding:0 12px;flex-shrink:0;overflow-x:auto}
.tab-bar::-webkit-scrollbar{display:none}
.tbtab{padding:0 12px;height:40px;font-size:12px;color:var(--tx3);cursor:pointer;border-bottom:1.5px solid transparent;margin-bottom:-0.5px;white-space:nowrap;display:flex;align-items:center;letter-spacing:.4px}
.tbtab.active{color:var(--acc);border-bottom-color:var(--acc);font-weight:500}
.mc{flex:1;overflow-y:auto;padding:15px 16px;-webkit-overflow-scrolling:touch}
/* Cards */
.card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:10px}
.card-bd{padding:14px 15px}
.sec-lb{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-bottom:9px}
.pf-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:0.5px solid var(--bd);gap:8px}
.pf-row:last-child{border-bottom:none}.pfk{font-size:12px;color:var(--tx3);flex-shrink:0}.pfv{font-size:13px;font-weight:500;color:var(--tx);text-align:right}
/* Products */
.prod-item{display:flex;align-items:center;gap:9px;padding:9px 15px;border-bottom:0.5px solid var(--bd)}
.prod-item:last-of-type{border-bottom:none}
.prod-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}.dot-n{background:var(--gold)}.dot-e{background:var(--tx3)}
.prod-nm{font-size:14px;flex:1;color:var(--tx)}.prod-brand{font-size:11px;color:var(--tx3)}
.del-x{font-size:18px;color:var(--tx3);cursor:pointer;padding:0 3px;background:none;border:none;line-height:1;flex-shrink:0}
.del-x:hover{color:#a05050}
.add-row{padding:10px 15px;font-size:12px;color:var(--acc2);cursor:pointer;text-align:center;border-top:0.5px solid var(--bd)}
.add-row:hover{background:var(--bg2)}
.pbadge{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:500;flex-shrink:0}
.pb-t{background:var(--roseb);color:var(--rose)}.pb-s{background:var(--sageb);color:var(--sage)}.pb-e{background:var(--bg3);color:var(--tx3)}.pb-new{background:var(--goldb);color:var(--gold)}
/* Visit type badges */
.vtype{font-size:9px;padding:2px 8px;border-radius:20px;font-weight:600;flex-shrink:0}
.vt-new{background:var(--sageb);color:var(--sage)}.vt-skin{background:var(--goldb);color:var(--gold)}.vt-healing{background:var(--healb);color:var(--heald)}
/* Visit cards */
.visit-card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);margin-bottom:8px;overflow:hidden}
.visit-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;cursor:pointer;gap:8px;user-select:none}
.visit-hd:hover{background:var(--bg2)}.v-date{font-size:14px;font-weight:500;color:var(--tx)}.v-meta{font-size:11px;color:var(--tx3);margin-top:3px}
.visit-body{padding:0 15px 14px;border-top:0.5px solid var(--bd)}
.vsec{margin-top:11px}.vlb{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.vtxt{font-size:14px;color:var(--tx);line-height:1.7;white-space:pre-wrap}
.chev{font-size:10px;color:var(--tx3);transition:transform .2s;flex-shrink:0}
/* Score bars */
.score-bar{display:flex;align-items:center;gap:8px;margin-top:3px}
.score-num{font-size:16px;font-weight:500;min-width:24px}.score-track{flex:1;height:5px;background:var(--bd);border-radius:3px;overflow:hidden}
.score-fill{height:100%;border-radius:3px}.sf-pain{background:var(--rose)}.sf-sleep{background:var(--heal)}.sf-stress{background:var(--gold)}.sf-muscle{background:var(--acc2)}.sf-conf{background:var(--sage)}
/* B/A photos */
.ba-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.ba-box{border-radius:var(--r);overflow:hidden;border:0.5px solid var(--bd)}
.ba-lbl{font-size:10px;font-weight:600;color:var(--tx3);text-align:center;padding:5px;background:var(--bg2);letter-spacing:.5px}
.ba-img{width:100%;max-height:160px;object-fit:cover;display:block}
/* Internal notes */
.int-wrap{background:rgba(139,110,82,.05);border:0.5px dashed rgba(139,110,82,.4);border-radius:var(--r);padding:11px 13px;margin-top:10px}
.int-lbl{font-size:10px;font-weight:600;color:#8b6e52;margin-bottom:5px;letter-spacing:.6px}
.int-txt{font-size:13px;color:#8b6e52;line-height:1.7;white-space:pre-wrap}
/* AI card */
.ai-card{border-radius:var(--rl);overflow:hidden;margin-top:13px;background:#2e2a26}
.ai-top{padding:14px 17px 11px;background:#2e2a26;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.ai-brand-lbl{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.28);font-weight:500;margin-bottom:4px}
.ai-cname{font-size:19px;font-weight:300;color:#fff;letter-spacing:.8px}.ai-sub{font-size:11px;color:rgba(255,255,255,.32);margin-top:2px}
.save-img-btn{background:rgba(255,255,255,.08);border:0.5px solid rgba(255,255,255,.15);border-radius:20px;padding:6px 12px;font-size:11px;color:rgba(255,255,255,.42);cursor:pointer;font-family:inherit;white-space:nowrap}
.save-img-btn:hover{background:rgba(255,255,255,.14);color:rgba(255,255,255,.7)}
.ai-analysis{background:#3a3530;padding:12px 17px;font-size:13px;color:rgba(255,255,255,.55);line-height:1.8;border-top:0.5px solid rgba(255,255,255,.06)}
.ai-am{background:#b5976a;padding:16px 17px}.ai-am-hd{display:flex;align-items:center;gap:9px;margin-bottom:14px}
.ai-am-icon{font-size:22px;line-height:1}.ai-am-title{font-size:13px;font-weight:600;color:#fffdf5;letter-spacing:1.5px}.ai-am-sub{font-size:10px;color:rgba(255,253,245,.48);margin-top:1px}
.ai-pm{background:#2a3a35;padding:16px 17px}.ai-pm-hd{display:flex;align-items:center;gap:9px;margin-bottom:14px}
.ai-pm-icon{font-size:22px;line-height:1}.ai-pm-title{font-size:13px;font-weight:600;color:#e8f0ee;letter-spacing:1.5px}.ai-pm-sub{font-size:10px;color:rgba(232,240,238,.38);margin-top:1px}
.ai-step{display:flex;align-items:flex-start;gap:11px;margin-bottom:11px}.ai-step:last-child{margin-bottom:0}
.ai-step-num{width:20px;height:20px;border-radius:50%;border:0.5px solid rgba(255,255,255,.22);color:rgba(255,255,255,.45);font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.ai-step-nm{font-size:15px;font-weight:500;color:#fff;margin-bottom:2px}.ai-step-hw{font-size:12px;color:rgba(255,255,255,.45);line-height:1.5}
.ai-tips{background:#241f1c;padding:14px 17px}.ai-tips-lbl{font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,.28);margin-bottom:10px;font-weight:500}
.ai-tip-row{display:flex;align-items:flex-start;gap:9px;margin-bottom:8px}.ai-tip-row:last-child{margin-bottom:0}
.ai-tip-dot{width:3px;height:3px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:8px}
.ai-tip-txt{font-size:13px;color:rgba(255,255,255,.52);line-height:1.7}
.ai-raw{background:#2e2a26;padding:14px 17px}.ai-raw-txt{font-size:13px;color:rgba(255,255,255,.58);line-height:1.9;white-space:pre-wrap}
.ai-loading{background:#2e2a26;border-radius:var(--rl);padding:18px 17px;display:flex;align-items:center;gap:9px;margin-top:13px}
.ai-loading-txt{font-size:13px;color:rgba(255,255,255,.42)}
.dots span{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.32);display:inline-block;animation:dp 1.2s infinite}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,80%,100%{opacity:.2}40%{opacity:.8}}
.ai-edit-wrap{margin-top:9px;background:var(--bg2);border:0.5px solid var(--bd);border-radius:var(--rl);overflow:hidden;display:none}
.ai-edit-toolbar{padding:8px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--bd);background:var(--bg)}
.ai-edit-lbl{font-size:10px;font-weight:600;color:var(--tx3);letter-spacing:.6px}
.ai-edit-ta{width:100%;padding:12px 13px;font-size:13px;color:var(--tx);background:var(--bg2);border:none;outline:none;font-family:inherit;line-height:1.9;resize:none;min-height:150px}
.ai-btns{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.gen-btn{width:100%;height:44px;border:0.5px solid var(--bd2);border-radius:var(--r);font-size:13px;color:var(--acc2);background:none;cursor:pointer;font-family:inherit;margin-top:11px}
.gen-btn:hover{background:var(--bg2)}
/* Aftercare card (for image export) */
.ac-card{background:#faf8f4;border-radius:12px;padding:22px;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif}
.ac-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid #e8e3da}
.ac-brand{font-size:9px;letter-spacing:2.5px;color:#a89e92;margin-bottom:3px}
.ac-name{font-size:20px;font-weight:300;color:#3d3530;letter-spacing:.8px}
.ac-date{font-size:11px;color:#a89e92;margin-top:2px}
.ac-badge{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:600}
.ac-sec{margin-bottom:14px}
.ac-sec-lbl{font-size:10px;font-weight:600;color:#a89e92;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px}
.ac-chips{display:flex;flex-wrap:wrap;gap:6px}
.ac-chip{font-size:12px;padding:4px 11px;border-radius:20px;font-weight:500}
.ac-chip-sage{background:#eaf0ea;color:#5a7a5a}.ac-chip-heal{background:#f0eef8;color:#5a4e7e}
.ac-txt{font-size:13px;color:#4a4038;line-height:1.8;white-space:pre-wrap}
.ac-next{background:#f0ede6;border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.ac-next-lbl{font-size:11px;color:#7a7268}
.ac-next-date{font-size:14px;font-weight:500;color:#3d3530}
.ac-footer{margin-top:14px;padding-top:12px;border-top:1px solid #e8e3da;display:flex;justify-content:space-between;align-items:center}
.ac-footer-brand{font-size:10px;letter-spacing:2px;color:#a89e92}
.ac-footer-note{font-size:10px;color:#c8c2b8}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(30,25,20,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg);border-radius:14px 14px 0 0;width:100%;max-width:560px;max-height:96dvh;overflow-y:auto;display:flex;flex-direction:column;-webkit-overflow-scrolling:touch}
@media(min-width:640px){.overlay{align-items:center;padding:16px}.modal{border-radius:var(--rl);max-height:92dvh}}
.modal-hd{padding:15px 17px;border-bottom:0.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;background:var(--bg);z-index:1}
.modal-title{font-size:15px;font-weight:500;color:var(--tx)}
.modal-close{font-size:22px;color:var(--tx3);cursor:pointer;background:none;border:none;font-family:inherit;line-height:1;padding:0 3px}
/* Step bar */
.step-bar{display:flex;gap:4px;padding:10px 17px 8px;background:var(--bg2);border-bottom:0.5px solid var(--bd);flex-shrink:0}
.step-dot{flex:1;height:3px;border-radius:2px;background:var(--bd);transition:background .25s}
.step-dot.done{background:var(--acc)}.step-dot.cur{background:var(--acc2)}
.step-lbl{font-size:10px;color:var(--tx3);padding:0 17px 8px;background:var(--bg2);letter-spacing:.5px;flex-shrink:0}
.modal-body{padding:17px;display:flex;flex-direction:column;gap:13px;flex:1}
.modal-ft{padding:12px 17px;border-top:0.5px solid var(--bd);display:flex;gap:8px;position:sticky;bottom:0;background:var(--bg);padding-bottom:max(12px,env(safe-area-inset-bottom));flex-shrink:0}
/* Form elements */
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:10px;font-weight:600;color:var(--tx3);letter-spacing:.8px;text-transform:uppercase}
.fg input,.fg select,.fg textarea{padding:10px 12px;border:0.5px solid var(--bd2);border-radius:var(--r);font-size:15px;color:var(--tx);background:var(--bg2);width:100%;font-family:inherit;outline:none;-webkit-appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--acc2);background:var(--bg)}
.fg textarea{resize:none;min-height:70px;line-height:1.6}.fg small{font-size:11px;color:var(--tx3);line-height:1.5}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:3px}
.chip,.nchip{font-size:13px;padding:8px 15px;border-radius:20px;border:0.5px solid var(--bd2);cursor:pointer;color:var(--tx2);background:var(--bg);user-select:none;-webkit-user-select:none;touch-action:manipulation;display:inline-flex;align-items:center;min-height:36px;-webkit-tap-highlight-color:transparent;font-family:inherit;outline:none;-webkit-appearance:none}
.chip.on,.nchip.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.hchip{border-color:var(--healb)}.hchip.on{background:var(--heal);border-color:var(--heal);color:#fff}
/* Range slider */
.range-wrap{padding:2px 0}
.rng{-webkit-appearance:none;width:100%;height:5px;border-radius:3px;outline:none;border:none;background:var(--bd2)}
.rng::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--acc);cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.18)}
.rng.hrng::-webkit-slider-thumb{background:var(--heal)}
.rng-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--tx3);margin-top:4px}
.rng-val{text-align:center;font-size:22px;font-weight:400;color:var(--acc);margin-top:2px}
.rng-val.hval{color:var(--heal)}
/* Mood */
.mood-strip{display:flex;justify-content:space-between;margin-top:8px}
.mood-opt{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 4px;border-radius:var(--r);border:0.5px solid transparent;flex:1;transition:all .15s}
.mood-opt:hover{background:var(--bg2)}.mood-opt.on{background:var(--bg3);border-color:var(--bd2)}
.mood-em{font-size:22px;line-height:1}.mood-lb{font-size:9px;color:var(--tx3);text-align:center}
/* Photo upload */
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
.photo-slot{border:1.5px dashed var(--bd2);border-radius:var(--r);overflow:hidden;cursor:pointer;min-height:120px;display:flex;flex-direction:column;transition:border-color .2s}
.photo-slot:hover{border-color:var(--acc2)}
.photo-lbl{font-size:10px;font-weight:600;color:var(--tx3);text-align:center;padding:6px;background:var(--bg2);letter-spacing:.5px}
.photo-prev{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);min-height:90px}
.photo-prev img{width:100%;height:110px;object-fit:cover}
.photo-prev.empty{flex-direction:column;gap:4px;color:var(--tx3);font-size:12px}
/* Type selector */
.type-grid{display:flex;flex-direction:column;gap:9px}

function resizeImg(file,cb){
  var r=new FileReader();r.onload=function(e){
    var img=new Image();img.onload=function(){
      var max=700,w=img.width,h=img.height,ratio=1;
      if(w>max||h>max)ratio=Math.min(max/w,max/h);
      var cv=document.createElement('canvas');cv.width=Math.round(w*ratio);cv.height=Math.round(h*ratio);
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);cb(cv.toDataURL('image/jpeg',0.72));
    };img.src=e.target.result;
  };r.readAsDataURL(file);
}

function openSkincareRoutine(){
  if(!cur)return;
  var sr=cur.skinRoutine||{am:[],pm:[],notes:'',updated:''};
  // 相容舊格式（字串→陣列）
  var srAM=Array.isArray(sr.am)?sr.am.slice():(sr.am?sr.am.split('\n').map(function(s){return s.trim();}).filter(Boolean):[]);
  var srPM=Array.isArray(sr.pm)?sr.pm.slice():(sr.pm?sr.pm.split('\n').map(function(s){return s.trim();}).filter(Boolean):[]);
  var srNotes=sr.notes||'';

  function getProds(){
    var list=(cur.nini||[]).slice();
    (cur.ext||[]).forEach(function(e){list.push(e.name+(e.brand?' ('+e.brand+')':''));});
    return list;
  }

  function stepItem(p,i,arr,pfx,bg,col){
    var html='<div style="display:flex;align-items:center;gap:7px;background:'+bg+';border-radius:var(--r);padding:8px 11px;margin-bottom:4px">';
    html+='<span style="font-size:11px;font-weight:700;color:'+col+';min-width:18px">'+(i+1)+'</span>';
    html+='<span style="flex:1;font-size:13px;color:var(--tx)">'+esc(p)+'</span>';
    if(i>0)html+='<button class="ab" data-'+pfx+'up="'+i+'" style="font-size:11px;padding:3px 8px">↑</button>';
    if(i<arr.length-1)html+='<button class="ab" data-'+pfx+'dn="'+i+'" style="font-size:11px;padding:3px 8px">↓</button>';
    html+='<button class="ab" data-'+pfx+'rm="'+i+'" style="font-size:11px;padding:3px 8px;color:#a05050;border-color:#d4aaaa">✕</button>';
    html+='</div>';return html;
  }

  function renderModal(){
    var prods=getProds();
    var html='<div class="modal-hd"><span class="modal-title">💧 '+esc(cur.name)+' · 保養步驟</span><button id="sr-close" class="modal-close">×</button></div>';
    html+='<div class="modal-body">';

    // 手邊品項清單
    html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
    html+='<div class="sec-lb" style="margin:0">手邊品項</div>';
    html+='<button class="ab" id="sr-add-prod" style="font-size:11px">+ 新增帶回品項</button></div>';
    if(prods.length){
      html+='<div style="display:flex;flex-direction:column;gap:0">';
      prods.forEach(function(p,i){
        var inAM=srAM.indexOf(p)>=0,inPM=srPM.indexOf(p)>=0;
        html+='<div style="display:flex;align-items:center;gap:7px;padding:9px 0;border-bottom:0.5px solid var(--bd)">';
        html+='<div style="flex:1;font-size:13px;color:var(--tx)">'+esc(p)+'</div>';
        html+='<button class="ab sr-tog" data-idx="'+i+'" data-t="am" style="font-size:11px;padding:4px 9px;'+(inAM?'background:var(--gold);color:#fff;border-color:var(--gold)':'')+'">☀ AM</button>';
        html+='<button class="ab sr-tog" data-idx="'+i+'" data-t="pm" style="font-size:11px;padding:4px 9px;'+(inPM?'background:var(--heal);color:#fff;border-color:var(--heal)':'')+'">🌙 PM</button>';
        html+='</div>';
      });
      html+='</div>';
    } else {
      html+='<div style="font-size:12px;color:var(--tx3);padding:6px 0">尚無手邊品項，請點右上角新增</div>';
    }

    // AM 步驟
    html+='<div class="sec-lb" style="margin-top:16px;margin-bottom:8px">☀ AM 早上步驟順序</div>';
    if(srAM.length){
      srAM.forEach(function(p,i){html+=stepItem(p,i,srAM,'am','var(--goldb)','var(--gold)');});
    } else {
      html+='<div style="font-size:12px;color:var(--tx3);padding:4px 0">點選品項旁的「☀ AM」加入早上步驟</div>';
    }

    // PM 步驟
    html+='<div class="sec-lb" style="margin-top:16px;margin-bottom:8px">🌙 PM 晚上步驟順序</div>';
    if(srPM.length){
      srPM.forEach(function(p,i){html+=stepItem(p,i,srPM,'pm','var(--healb)','var(--heal)');});
    } else {
      html+='<div style="font-size:12px;color:var(--tx3);padding:4px 0">點選品項旁的「🌙 PM」加入晚上步驟</div>';
    }

    // 備註
    html+='<div class="fg" style="margin-top:16px"><label>💡 Ni 的備註</label>';
    html+='<textarea id="sr-notes" style="min-height:55px;line-height:1.8">'+esc(srNotes)+'</textarea></div>';
    if(sr.updated&&typeof sr.updated==='string')html+='<div style="font-size:11px;color:var(--tx3);text-align:right;margin-top:4px">上次更新：'+esc(sr.updated)+'</div>';
    html+='</div>';
    html+='<div class="modal-ft"><button id="sr-cancel" class="btn-cn">取消</button><button id="sr-save" class="btn-sv">💾 儲存順序</button></div>';

    openModal(html,function(modal){
      var prods2=getProds();
      // 儲存備註前先抓目前值
      function saveNoteState(){var n=modal.querySelector('#sr-notes');if(n)srNotes=n.value;}

      // AM/PM toggle
      modal.querySelectorAll('.sr-tog').forEach(function(btn){
        btn.addEventListener('click',function(){
          saveNoteState();
          var idx=parseInt(this.getAttribute('data-idx'));
          var t=this.getAttribute('data-t');
          var p=prods2[idx];if(!p)return;
          if(t==='am'){var i=srAM.indexOf(p);if(i>=0)srAM.splice(i,1);else srAM.push(p);}
          else{var i=srPM.indexOf(p);if(i>=0)srPM.splice(i,1);else srPM.push(p);}
          renderModal();
        });
      });
      // AM ↑↓✕
      modal.querySelectorAll('[data-amup]').forEach(function(b){b.addEventListener('click',function(){saveNoteState();var i=parseInt(this.dataset.amup);var t=srAM[i-1];srAM[i-1]=srAM[i];srAM[i]=t;renderModal();});});
      modal.querySelectorAll('[data-amdn]').forEach(function(b){b.addEventListener('click',function(){saveNoteState();var i=parseInt(this.dataset.amdn);var t=srAM[i+1];srAM[i+1]=srAM[i];srAM[i]=t;renderModal();});});
      modal.querySelectorAll('[data-amrm]').forEach(function(b){b.addEventListener('click',function(){saveNoteState();srAM.splice(parseInt(this.dataset.amrm),1);renderModal();});});
      // PM ↑↓✕
      modal.querySelectorAll('[data-pmup]').forEach(function(b){b.addEventListener('click',function(){saveNoteState();var i=parseInt(this.dataset.pmup);var t=srPM[i-1];srPM[i-1]=srPM[i];srPM[i]=t;renderModal();});});
      modal.querySelectorAll('[data-pmdn]').forEach(function(b){b.addEventListener('click',function(){saveNoteState();var i=parseInt(this.dataset.pmdn);var t=srPM[i+1];srPM[i+1]=srPM[i];srPM[i]=t;renderModal();});});
      modal.querySelectorAll('[data-pmrm]').forEach(function(b){b.addEventListener('click',function(){saveNoteState();srPM.splice(parseInt(this.dataset.pmrm),1);renderModal();});});
      // 新增帶回品項
      modal.querySelector('#sr-add-prod').addEventListener('click',function(){saveNoteState();openAddProdForRoutine(function(){renderModal();});});
      modal.querySelector('#sr-close').addEventListener('click',closeModal);
      modal.querySelector('#sr-cancel').addEventListener('click',closeModal);
      modal.querySelector('#sr-save').addEventListener('click',function(){
        saveNoteState();
        var now=new Date();
        var dateStr=now.getFullYear()+'/'+(now.getMonth()+1)+'/'+now.getDate();
        cur.skinRoutine={am:srAM,pm:srPM,notes:srNotes,updated:dateStr};
        saveData();closeModal();
        if(document.getElementById('tab-profile')&&document.getElementById('tab-profile').classList.contains('active'))renderProfile();
        alert('✓ 保養順序已儲存！');
      });
    });
  }
  renderModal();
}

function openAddProdForRoutine(callback){

  if(available.length){html+='<div class="chip-row" id="apr-nini-chips" style="margin-bottom:12px"></div>';}
  else{html+='<div style="font-size:12px;color:var(--tx3);margin-bottom:12px">所有 Zero 品項皆已加入</div>';}

  html+='<div class="fg"><label>類型</label><select id="apr-type"><option>乳液/乳霜</option><option>精華液</option><option>化妝水</option><option>防曬</option><option>卸妝</option><option>洗面乳</option><option>眼霜</option><option>面膜</option><option>其他</option></select></div>';
  html+='</div>';
  html+='<div class="modal-ft"><button id="apr-cancel" class="btn-cn">取消</button><button id="apr-save" class="btn-sv">新增並帶入</button></div>';
  openModal(html,function(modal){
    var chipsWrap=modal.querySelector('#apr-nini-chips');
    if(chipsWrap&&available.length){
      available.forEach(function(p){
        var c=makeChip(p.name,false,'nchip');
        c.addEventListener('click',function(e){e.preventDefault();this.classList.toggle('on');});
        chipsWrap.appendChild(c);
      });
    }
    modal.querySelector('#apr-close').addEventListener('click',closeModal);
    modal.querySelector('#apr-cancel').addEventListener('click',closeModal);
    modal.querySelector('#apr-save').addEventListener('click',function(){
      var added=false;
      if(chipsWrap){chipsWrap.querySelectorAll('.nchip.on').forEach(function(c){var n=c.textContent;if((cur.nini||[]).indexOf(n)<0){if(!cur.nini)cur.nini=[];cur.nini.push(n);added=true;}});}
      var name=modal.querySelector('#apr-name').value.trim();
      if(name){if(!cur.ext)cur.ext=[];cur.ext.push({name:name,brand:modal.querySelector('#apr-brand').value.trim(),type:modal.querySelector('#apr-type').value});added=true;}
      if(added)saveData();
      closeModal();callback();
    });
  });

var STEP_LABELS={
  new:['基本資料','身心狀況','膚況評估','建議方向'],
  skin:['基本資料','膚況追蹤','保養調整','護理記錄'],
  healing:['基本資料','上次療效','本次感應','護理記錄']
};
function openVisitForm(type,editIdx){
  vmType=type;vmStep=0;vmEditIdx=editIdx;vmBefore='';vmAfter='';
  if(editIdx!==null&&editIdx!==undefined){
    var ev=cur.visits[editIdx]||{};vmBefore=ev.sv_beforePhoto||'';vmAfter=ev.sv_afterPhoto||'';
    vmState=JSON.parse(JSON.stringify(ev));
  } else {vmState={};}
  renderVMStep();
}
function renderVMStep(){
  var labels=STEP_LABELS[vmType],total=labels.length,isHeal=vmType==='healing';
  var isEdit=vmEditIdx!==null&&vmEditIdx!==undefined;
  var titlePrefix=isEdit?'編輯':'新增';
  var typeN=vtLabel(vmType);
  var html='<div class="modal-hd"><span class="modal-title">'+titlePrefix+' · '+typeN+'</span><button id="vm-close" class="modal-close">×</button></div>';
  html+='<div class="step-bar">';
  for(var si=0;si<total;si++)html+='<div class="step-dot'+(si<vmStep?' done':si===vmStep?' cur':'')+'"></div>';
  html+='</div>';
  html+='<div class="step-lbl">步驟 '+(vmStep+1)+' / '+total+' · '+labels[vmStep]+'</div>';
  html+='<div class="modal-body" id="vm-body">'+buildVMStepBody()+'</div>';
  html+='<div class="modal-ft" id="vm-ft">';
  if(vmStep>0)html+='<button class="btn-back" id="vm-back">← 上一步</button>';
  else html+='<button class="btn-cn" id="vm-back">取消</button>';
  if(vmStep<total-1)html+='<button class="btn-next'+(isHeal?' heal':'')+'" id="vm-next">下一步 →</button>';
  else html+='<button class="btn-next'+(isHeal?' heal':'')+'" id="vm-save">✓ 完成儲存</button>';
  html+='</div>';
  openModal(html,function(modal){
    try{bindVMChips(modal);}catch(e){console.warn('bindVMChips error:',e);}
    // Bind routine-list nchip toggle (step 0 of new visit)
    var rList=modal.querySelector('#routine-list');
    if(rList){rList.querySelectorAll('.nchip').forEach(function(chip){chip.addEventListener('click',function(e){e.preventDefault();this.classList.toggle('on');});});}
    modal.querySelector('#vm-close').addEventListener('click',closeModal);
    modal.querySelector('#vm-back').addEventListener('click',function(){
      if(vmStep===0){closeModal();return;}collectVMStep(modal);vmStep--;renderVMStep();
    });
    var nxtEl=modal.querySelector('#vm-next');var savEl=modal.querySelector('#vm-save');
    if(nxtEl)nxtEl.addEventListener('click',function(){collectVMStep(modal);vmStep++;renderVMStep();});
    if(savEl)savEl.addEventListener('click',function(){collectVMStep(modal);finalSaveVisit();});
    // Photo upload for skin
    if(vmType==='skin'&&vmStep===1){
      var pbInp=modal.querySelector('#sk-before-inp');var paInp=modal.querySelector('#sk-after-inp');
      var pbPrev=modal.querySelector('#sk-bprev');var paPrev=modal.querySelector('#sk-aprev');
      if(pbInp)pbInp.addEventListener('change',function(){resizeImg(this.files[0],function(b64){vmBefore=b64;if(pbPrev){pbPrev.classList.remove('empty');pbPrev.innerHTML='<img src="'+b64+'">';}});});
      if(paInp)paInp.addEventListener('change',function(){resizeImg(this.files[0],function(b64){vmAfter=b64;if(paPrev){paPrev.classList.remove('empty');paPrev.innerHTML='<img src="'+b64+'">';}});});
      var pbSlot=modal.querySelector('#sk-bslot');var paSlot=modal.querySelector('#sk-aslot');
      if(pbSlot)pbSlot.addEventListener('click',function(){if(pbInp)pbInp.click();});
      if(paSlot)paSlot.addEventListener('click',function(){if(paInp)paInp.click();});
    }
    // Internal note toggle
    var intBtn=modal.querySelector('#int-show-btn');
    if(intBtn)intBtn.addEventListener('click',function(){
      var wrap=modal.querySelector('#int-fields');if(wrap)wrap.style.display=wrap.style.display==='none'?'block':'none';
    });
    // Range value display
    modal.querySelectorAll('.rng').forEach(function(r){
      updateRng(r);r.addEventListener('input',function(){updateRng(this);});
    });
  });
}
function updateRng(el){
  var vd=document.getElementById(el.id+'-v');if(vd)vd.textContent=el.value;
  var pct=Math.round((el.value-el.min)/(el.max-el.min)*100);
  el.style.background='linear-gradient(to right,'+(el.classList.contains('hrng')?'var(--heal)':'var(--acc)')+' 0%,'+(el.classList.contains('hrng')?'var(--heal)':'var(--acc)')+' '+pct+'%,var(--bd2) '+pct+'%)';
}
function buildVMStepBody(){
  if(vmType==='new'){
    if(vmStep===0)return buildNewStep0();
    if(vmStep===1)return buildNewStep1();
    if(vmStep===2)return buildNewStep2();
    return buildNewStep3();
  }
  if(vmType==='skin'){
    if(vmStep===0)return buildSkinStep0();
    if(vmStep===1)return buildSkinStep1();
    if(vmStep===2)return buildSkinStep2();
    return buildSkinStep3();
  }
  // healing

// ── AI Card Builder ──
function buildAICard(raw,name,date,season,idx){
  var lines=raw.split('\n'),amSteps=[],pmSteps=[],tips=[],analysis=[],sec='';
  lines.forEach(function(line){
    line=line.trim();if(!line)return;
    if(/^一[、.．:：]|膚況簡析|膚況分析/.test(line)){sec='analysis';var t=line.replace(/^一[、.．:：]\s*/,'').replace(/膚況(簡析|分析)[：:]\s*/,'').trim();if(t)analysis.push(t);}
    else if(/^二[、.．:：]|保養步驟/.test(line)){sec='steps';}
    else if(/^三[、.．:：]|特別提醒|提醒$/.test(line)){sec='tips';}
    else if(sec==='analysis')analysis.push(line);
    else if(sec==='steps'){
      var isBoth=/^早晚\s*[｜|]/.test(line);var isAm=!isBoth&&/^早\s*[｜|]/.test(line);var isPm=!isBoth&&/^晚\s*[｜|]/.test(line);
      if(isBoth){amSteps.push(line);pmSteps.push(line);}else if(isAm)amSteps.push(line);else if(isPm)pmSteps.push(line);
    } else if(sec==='tips')tips.push(line.replace(/^[-·・•]\s*/,'').replace(/^\d+[.．、]\s*/,''));
  });
  function parseStep(s,si){
    var clean=s.replace(/^(早晚|早|晚)\s*[｜|]\s*/,'').replace(/^\d+[.．、]\s*/,'').replace(/^[-·・]\s*/,'');
    var sep=clean.search(/[—－：:]/);var nm=sep>0?clean.slice(0,sep).trim():clean;var hw=sep>0?clean.slice(sep+1).trim():'';
    return '<div class="ai-step"><div class="ai-step-num">'+(si+1)+'</div><div><div class="ai-step-nm">'+esc(nm)+'</div>'+(hw?'<div class="ai-step-hw">'+esc(hw)+'</div>':'')+'</div></div>';
  }
  var out='<div class="ai-card" id="ai-card-'+idx+'">';
  out+='<div class="ai-top"><div><div class="ai-brand-lbl">NINI · AI 諮詢建議</div><div class="ai-cname">'+esc(name)+'</div><div class="ai-sub">'+esc(date)+' · '+esc(season)+'</div></div></div>';
  if(analysis.length)out+='<div class="ai-analysis">'+analysis.map(function(a){return esc(a);}).join('<br>')+'</div>';
  if(amSteps.length){
    out+='<div class="ai-am"><div class="ai-am-hd"><div class="ai-am-icon">🌤</div><div><div class="ai-am-title">日間保養</div><div class="ai-am-sub">早晨使用</div></div></div>';
    amSteps.forEach(function(s,si){out+=parseStep(s,si);});out+='</div>';
  }
  if(pmSteps.length){
    out+='<div class="ai-pm"><div class="ai-pm-hd"><div class="ai-pm-icon">🌙</div><div><div class="ai-pm-title">夜間保養</div><div class="ai-pm-sub">睡前使用</div></div></div>';
    pmSteps.forEach(function(s,si){out+=parseStep(s,si);});out+='</div>';
  }
  if(tips.length){
    out+='<div class="ai-tips"><div class="ai-tips-lbl">本次特別提醒</div>';
    tips.forEach(function(t){out+='<div class="ai-tip-row"><div class="ai-tip-dot"></div><div class="ai-tip-txt">'+esc(t)+'</div></div>';});
    out+='</div>';
  }
  if(!amSteps.length&&!pmSteps.length)out+='<div class="ai-raw"><div class="ai-raw-txt">'+esc(raw)+'</div></div>';
  out+='</div>';return out;
}

    +'請依以下規則輸出保養建議：\n\n'
    +'一、膚況簡析：（2句，不使用「你」「妳」等稱謂，直接描述膚況狀態）\n\n'
    +'二、保養步驟：\n保養順序：純露 → 原液（功效型優先）→ 其他精華 → 乳液/乳霜 → 防曬（早晨最後）\n每步驟格式（嚴格一行一步）：\n早 ｜ 產品名 — 用法\n晚 ｜ 產品名 — 用法\n早晚 ｜ 產品名 — 用法\n純露說「噴灑全臉」或「濕敷 3-5 分鐘」；塗抹說「按壓」；不使用「你」「妳」；用法不超過20字。\n\n'
    +'三、特別提醒：（2條，以 · 開頭，不使用稱謂）\n\n請嚴格遵守格式。';
  fetch('https://api.anthropic.com/v1/messages',{

    headers:{'content-type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:API_MODEL,max_tokens:900,messages:[{role:'user',content:prompt}]})
  }).then(function(res){return res.json().then(function(d){if(!res.ok)throw new Error((d.error&&d.error.message)||'HTTP '+res.status);return d;});})
  .then(function(data){

    if(v.purchased&&v.purchased.length)v.purchased.forEach(function(p){if(cur.nini.indexOf(p)<0)cur.nini.push(p);});

  var d={name:name,age:modal.querySelector('#m-age').value,job:modal.querySelector('#m-job').value,skinTypes:skinTypes,concerns:concerns,season:modal.querySelector('#m-season').value,note:modal.querySelector('#m-note').value};
  var nid=parseInt(id);
  if(!isNaN(nid)&&nid>0){for(var i=0;i<clients.length;i++){if(clients[i].id===nid){for(var k in d)clients[i][k]=d[k];cur=clients[i];break;}}}
  else{var nc={id:nextId(),nini:[],ext:[],visits:[]};for(var k in d)nc[k]=d[k];clients.push(nc);cur=nc;}
  saveData();closeModal();renderSB();renderTop();
  var tabBar=document.querySelector('.tab-bar');if(tabBar)tabBar.classList.remove('hidden');
  if(pendingVisitType){var pvt=pendingVisitType;pendingVisitType=null;renderTab(curTab);setTimeout(function(){openVisitForm(pvt,null);},80);}
  else{renderTab(curTab);}
}
function deleteClient(){
  if(!confirm('確定刪除癒米「'+cur.name+'」？'))return;
  clients=clients.filter(function(c){return c.id!==cur.id;});
  if(!clients.length)clients=JSON.parse(JSON.stringify(DEFAULTS));
  cur=null;saveData();closeModal();renderSB();renderTop();renderTab('profile');
}
// ── Add NINI Products ──
function openAddNini(){
  var cats=[];NINI_PRODS.forEach(function(p){if(cats.indexOf(p.cat)<0)cats.push(p.cat);});
  var html='<div class="modal-hd"><span class="modal-title">新增產品</span><button id="an-close" class="modal-close">×</button></div><div class="modal-body" id="an-body"></div><div class="modal-ft"><button id="an-cancel" class="btn-cn">取消</button><button id="an-save" class="btn-sv">新增選取</button></div>';
  openModal(html,function(modal){
    var body=modal.querySelector('#an-body'),hasAny=false;
    cats.forEach(function(cat){
      var ps=NINI_PRODS.filter(function(p){return p.cat===cat&&cur.nini.indexOf(p.name)<0;});
      if(!ps.length)return;hasAny=true;
      var catDiv=document.createElement('div');catDiv.style.marginBottom='14px';
      var lbl=document.createElement('div');lbl.className='sec-lb';lbl.style.marginBottom='7px';lbl.textContent=cat;catDiv.appendChild(lbl);
      var row=document.createElement('div');row.className='chip-row';
      ps.forEach(function(p){row.appendChild(makeChip(p.name,false,'nchip'));});
      catDiv.appendChild(row);body.appendChild(catDiv);
    });
    if(!hasAny)body.innerHTML='<div class="empty-st">所有產品都已加入</div>';
    modal.querySelector('#an-close').addEventListener('click',closeModal);
    modal.querySelector('#an-cancel').addEventListener('click',closeModal);
    modal.querySelector('#an-save').addEventListener('click',function(){
      var sel=chipsVal(body);if(!sel.length){alert('請選取至少一個');return;}
      sel.forEach(function(s){cur.nini.push(s);});saveData();closeModal();renderProfile();
    });
  });
}
// ── Add External Products ──
function openAddExt(){
  var extHtml='<select id="e-type">';EXT_TYPES.forEach(function(t){extHtml+='<option>'+esc(t)+'</option>';});extHtml+='</select>';
  var html='<div class="modal-hd"><span class="modal-title">新增其他產品</span><button id="ae-close" class="modal-close">×</button></div><div class="modal-body"><div class="fg"><label>產品名稱</label><input id="e-name" placeholder="ex. Advanced Night Repair 眼霜"></div><div class="f2"><div class="fg"><label>品牌</label><input id="e-brand" placeholder="ex. Estée Lauder"></div><div class="fg"><label>類型</label>'+extHtml+'</div></div></div><div class="modal-ft"><button id="ae-cancel" class="btn-cn">取消</button><button id="ae-save" class="btn-sv">新增</button></div>';
  openModal(html,function(modal){
    modal.querySelector('#ae-close').addEventListener('click',closeModal);
    modal.querySelector('#ae-cancel').addEventListener('click',closeModal);
    modal.querySelector('#ae-save').addEventListener('click',function(){
      var name=modal.querySelector('#e-name').value.trim();if(!name){alert('請輸入產品名稱');return;}
      cur.ext.push({name:name,brand:modal.querySelector('#e-brand').value,type:modal.querySelector('#e-type').value});
      saveData();closeModal();renderProfile();
    });
  });
}
// ── Settings ──
function renderSettings(){
  var mc=document.getElementById('mc'),html='';
  html+='<div class="card"><div class="card-bd"><div class="sec-lb">Claude API Key</div>';
  html+='<div style="font-size:13px;color:var(--tx2);margin-bottom:12px;line-height:1.7">前往 console.anthropic.com → API Keys → 複製 Key<br>';
  html+=apiKey?'<span style="color:var(--sage);font-weight:500">✓ 已設定（'+esc(apiKey.slice(0,14))+'...）</span>':'<span style="color:var(--rose)">尚未設定</span>';
  html+='</div><div class="key-row"><input id="ki" type="text" autocomplete="off" spellcheck="false" placeholder="sk-ant-api03-..." value="'+esc(apiKey)+'" class="key-in"><button id="key-save-btn" class="key-btn">儲存</button></div></div></div>';
  html+='<div class="card"><div class="card-bd"><div class="sec-lb">資料備份與還原</div><div style="font-size:13px;color:var(--tx2);margin-bottom:12px;line-height:1.7">匯出備份保留所有癒米資料，換裝置時可匯入還原</div>';
  html+='<div style="display:flex;gap:8px"><button class="btn-ol" style="margin:0;flex:1" id="export-btn">↓ 匯出備份 (.json)</button><button class="btn-ol" style="margin:0;flex:1" id="import-btn">↑ 匯入還原</button></div>';
  html+='<input type="file" id="import-file" accept=".json" style="display:none"></div></div>';
  html+='<div class="card"><div class="card-bd"><div class="sec-lb">連線測試</div><button class="btn-ol" style="margin-top:0" id="test-api-btn">測試 API 連線</button></div></div>';
  html+='<div class="card"><div class="card-bd"><div class="sec-lb">加入主畫面</div><div style="font-size:13px;color:var(--tx2);line-height:1.9">iOS Safari：分享按鈕 → 加入主畫面<br>Android Chrome：右上選單 → 新增到主畫面<br><br>直接用瀏覽器開 .html 即可，無需 Netlify</div></div></div>';
  mc.innerHTML=html;
  mc.querySelector('#key-save-btn').addEventListener('click',function(){
    var v=document.getElementById('ki').value.trim();if(!v){alert('請輸入 API Key');return;}
    if(v.indexOf('sk-ant-')!==0){if(!confirm('Key 格式不像 sk-ant- 開頭，確定儲存？'))return;}
    saveApiKey(v);alert('✓ 已儲存\n'+v.slice(0,15)+'...\n長度：'+v.length+' 字元');renderSettings();
  });
  mc.querySelector('#export-btn').addEventListener('click',exportData);
  mc.querySelector('#import-btn').addEventListener('click',function(){document.getElementById('import-file').click();});
  mc.querySelector('#import-file').addEventListener('change',function(){importData(this);});
  mc.querySelector('#test-api-btn').addEventListener('click',testAPI);
}
function exportData(){
  var data={version:'nini_v10',exportDate:today(),clients:clients};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var link=document.createElement('a');link.download='NINI_備份_'+today().replace(/\//g,'-')+'.json';
  link.href=URL.createObjectURL(blob);link.click();setTimeout(function(){URL.revokeObjectURL(link.href);},1000);
}
function importData(input){
  if(!input.files||!input.files[0])return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result),imported=data.clients||data;
      if(!Array.isArray(imported)){alert('檔案格式錯誤');return;}
      if(!confirm('確定匯入？這會覆蓋目前所有癒米資料（共 '+imported.length+' 位）。'))return;
      clients=imported;clients.forEach(function(c){if(!c.visits)c.visits=[];if(!c.skinTypes)c.skinTypes=c.skin?[c.skin]:['一般肌'];if(!c.nini)c.nini=[];if(!c.ext)c.ext=[];});
      cur=null;saveData();renderSB();renderTop();renderTab('profile');alert('✓ 匯入成功！共 '+clients.length+' 位客戶資料已還原。');
    }catch(err){alert('匯入失敗：'+err.message);}
  };reader.readAsText(input.files[0]);input.value='';
}
function testAPI(){
  if(!apiKey){alert('請先輸入 API Key');return;}
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',
    headers:{'content-type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:API_MODEL,max_tokens:20,messages:[{role:'user',content:'請回覆「連線成功」'}]})
  }).then(function(res){return res.json().then(function(d){return{ok:res.ok,status:res.status,data:d};});})
  .then(function(r){if(r.ok)alert('✅ 連線成功\n'+(r.data.content&&r.data.content[0]?r.data.content[0].text:''));else alert('❌ 失敗 HTTP '+r.status+'\n'+((r.data.error&&r.data.error.message)||''));})
  .catch(function(e){alert('❌ 連線異常：'+e.message);});
}
// ── Modal Helpers ──
function openModal(html,callback){
  var mw=document.getElementById('mw');
  var overlay=document.createElement('div');overlay.className='overlay';
  overlay.addEventListener('click',function(e){if(e.target===overlay)closeModal();});
  var modal=document.createElement('div');modal.className='modal';
  modal.addEventListener('click',function(e){e.stopPropagation();});
  modal.innerHTML=html;overlay.appendChild(modal);mw.innerHTML='';mw.appendChild(overlay);
  if(callback)callback(modal);
}
function closeModal(){document.getElementById('mw').innerHTML='';}

loadData();

document.getElementById('sb-mask').addEventListener('click',toggleSB);
document.getElementById('add-cl-btn').addEventListener('click',openAddClient);

document.getElementById('tab-profile').addEventListener('click',function(){switchTab('profile');});
document.getElementById('tab-visits').addEventListener('click',function(){switchTab('visits');});
document.getElementById('tab-settings').addEventListener('click',function(){switchTab('settings');});
document.getElementById('timer-btn').addEventListener('click',toggleTimer);
document.getElementById('t-start').addEventListener('click',startTimer);
document.getElementById('t-reset').addEventListener('click',resetTimer);
document.querySelectorAll('.t-preset').forEach(function(p){p.addEventListener('click',function(){setTimerPreset(parseInt(this.getAttribute('data-min')));});});
document.addEventListener('click',function(e){
  var panel=document.getElementById('timer-panel');var btn=document.getElementById('timer-btn');
  if(panel&&panel.classList.contains('open')&&!panel.contains(e.target)&&e.target!==btn){
    panel.classList.remove('open');if(btn)btn.classList.remove('timer-active');
  }
});
renderSB();renderTop();renderTab('profile');
</script>
