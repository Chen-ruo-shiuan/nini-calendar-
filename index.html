<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>預約月曆產生器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=New+Tegomin&family=Shippori+Mincho:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,"PingFang TC","Microsoft JhengHei",sans-serif;background:#f0ede8;min-height:100vh;display:flex}
.wrap{display:flex;flex:1;min-height:100vh}
.panel{width:340px;min-width:340px;background:#faf8f5;border-right:1px solid #ddd8d0;display:flex;flex-direction:column;overflow-y:auto}
.p-block{padding:12px 14px;border-bottom:1px solid #eae6e0}
.sec{font-size:10px;letter-spacing:0.09em;text-transform:uppercase;color:#8c8780;margin-bottom:8px;font-weight:500;display:flex;align-items:center;gap:6px}
.saved-dot{width:5px;height:5px;border-radius:50%;background:#6b9e6b;opacity:0;transition:opacity 1s;flex-shrink:0}
.saved-dot.show{opacity:1}
.field{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.field-hd{display:flex;align-items:center;justify-content:space-between}
.field-hd label{font-size:11px;color:#706c68}
.field input[type=text]{padding:6px 9px;border:1px solid #ddd8d0;border-radius:6px;font-size:12px;background:#fff;color:#2a2825;font-family:inherit;outline:none;width:100%}
.note-ta{width:100%;padding:6px 9px;border:1px solid #ddd8d0;border-radius:6px;font-size:12px;background:#fff;color:#2a2825;font-family:inherit;outline:none;resize:none;min-height:52px;max-height:120px;line-height:1.55;overflow-y:auto;display:block}
.align-row{display:flex;gap:5px;margin-top:5px}
.align-btn{flex:1;padding:6px;border:1px solid #ddd8d0;border-radius:6px;font-size:11px;cursor:pointer;background:#f0ede8;color:#8c8780;font-family:inherit;transition:all 0.1s}
.align-btn:hover{color:#4a4642;border-color:#8c8780}
.align-btn.on{background:#fff;border-color:#4a4642;color:#2a2825;font-weight:500}
.sz-ctrl{display:flex;align-items:center;gap:2px}
.sz-btn{width:17px;height:17px;border:1px solid #ddd8d0;border-radius:3px;background:#f0ede8;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;color:#4a4642;line-height:1;padding:0;font-family:inherit;transition:all 0.1s}
.sz-btn:hover{background:#e8e4df}
.sz-val{min-width:24px;text-align:center;font-size:10px;font-weight:500;color:#8c8780}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.nav-btn{width:28px;height:28px;border:1px solid #ddd8d0;border-radius:6px;background:#f0ede8;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:#4a4642;transition:all 0.1s}
.nav-btn:hover{background:#e8e4df}
.month-title{font-size:13px;font-weight:500;color:#2a2825}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px}
.cal-dow span{text-align:center;font-size:10px;color:#8c8780;padding:2px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.c-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:6px;font-size:12px;cursor:pointer;transition:all 0.1s;position:relative;color:#2a2825}
.c-cell:hover:not(.om){background:#e8e4df}
.c-cell.om{color:#b5b0a8;cursor:default}
.c-cell.has{font-weight:600}
.c-cell .dot{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%}
.c-cell .dot.dg{background:#6b9e6b}
.c-cell .dot.dc{background:#8c8780}
.c-cell .dot.df{background:#c0504a}
.c-cell .dot.dp{background:#c8804a}
.c-cell.sel{background:#2a2825!important;color:#f4f0eb!important}
.c-cell.sel .dot{opacity:0.7}
.date-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.date-lbl{font-size:12px;font-weight:500;color:#2a2825}
.btns-row{display:flex;gap:4px}
.sm-btn{font-size:10px;padding:3px 8px;border:1px solid #b5b0a8;border-radius:5px;background:#f0ede8;color:#706c68;cursor:pointer;transition:all 0.1s}
.sm-btn:hover{background:#e8e4df}
.sm-btn.red{border-color:#c0504a;color:#c0504a}
.sm-btn.red:hover{background:#fce8e8}
.status-row{display:flex;gap:5px;margin-bottom:8px}
.status-btn{flex:1;padding:6px 4px;border:1px solid #ddd8d0;border-radius:6px;text-align:center;font-size:11px;cursor:pointer;background:#f0ede8;color:#8c8780;transition:all 0.1s;font-family:inherit}
.status-btn.on-norm{border-color:#4a4642;background:#fff;color:#2a2825;font-weight:500}
.status-btn.on-closed{border-color:#8c8780;background:#e8e4df;color:#4a4642;font-weight:500}
.status-btn.on-full{border-color:#c0504a;background:#fce8e8;color:#c0504a;font-weight:500}
/* 時段標籤 - 刪去法 */
.slots-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.slot-tag{padding:8px 10px;border-radius:8px;font-size:12px;cursor:pointer;border:1.5px solid;user-select:none;transition:all 0.15s;text-align:center;font-weight:500;line-height:1.2}
.slot-tag.free{background:#d4e8d4;border-color:#9eca9e;color:#2d5a2d}
.slot-tag.free:hover{background:#c0ddc0}
.slot-tag.booked{background:#fce8e8;border-color:#e8a0a0;color:#9a4040;text-decoration:line-through;opacity:0.8}
.slot-tag.booked:hover{background:#f8d8d8}
.slot-tag.disabled{opacity:0.35;pointer-events:none;background:#f0ede8;border-color:#ddd8d0;color:#8c8780}
.slots-hint{font-size:10px;color:#9a8f84;margin-bottom:6px;line-height:1.5}
.crow{display:flex;gap:6px;margin-top:6px}
.crow input[type=time]{flex:1;padding:5px 8px;border:1px solid #ddd8d0;border-radius:6px;font-size:12px;background:#fff;color:#2a2825;font-family:inherit;outline:none}
.add-btn{padding:5px 10px;border:1px solid #ddd8d0;border-radius:6px;font-size:12px;cursor:pointer;background:#f0ede8;color:#4a4642;font-family:inherit;white-space:nowrap;transition:all 0.1s}
.add-btn:hover{background:#e8e4df}
.ctags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.ctag{padding:5px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid #9eb8d4;background:#e8f0f8;color:#2d4a6a;user-select:none;display:flex;align-items:center;gap:5px}
.ctag .rm{font-size:14px;color:#8c8780;line-height:1}
.no-sel{font-size:12px;color:#8c8780;text-align:center;padding:14px 0}
.sw-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-bottom:6px}
.sw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.12s;flex-shrink:0}
.sw:hover{transform:scale(1.1)}
.sw.sel{border-color:#2a2825;transform:scale(1.15)}
.cp-wrap{position:relative;width:22px;height:22px;border-radius:50%;overflow:hidden;cursor:pointer;border:2px solid #ddd8d0;background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red);flex-shrink:0}
.cp-wrap input[type=color]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;border:none;padding:0}
.color-section{margin-bottom:10px}
.color-lbl{font-size:11px;color:#706c68;margin-bottom:5px}
.font-opts{display:flex;flex-direction:column;gap:3px}
.font-opt{padding:7px 10px;border:1px solid #ddd8d0;border-radius:6px;cursor:pointer;background:#fff;transition:all 0.1s;display:flex;align-items:center;justify-content:space-between}
.font-opt:hover{background:#f0ede8}
.font-opt.on{border-color:#4a4642;background:#f0ede8}
.font-opt .fn{font-size:14px;color:#2a2825}
.font-opt .fp{font-size:10px;color:#8c8780}
.upload-z{border:1px dashed #c8c4be;border-radius:6px;padding:10px;text-align:center;cursor:pointer;color:#8c8780;font-size:11px;line-height:1.6;transition:all 0.1s;margin-bottom:6px}
.upload-z:hover{border-color:#8c8780;background:#f0ede8}
.ovrow{display:flex;align-items:center;gap:7px;font-size:11px;color:#706c68;margin-bottom:4px}
.tgl{position:relative;width:28px;height:16px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0;position:absolute}
.tsl{position:absolute;inset:0;background:#c8c4be;border-radius:16px;cursor:pointer;transition:0.2s}
.tsl:before{content:'';position:absolute;width:10px;height:10px;left:3px;top:3px;background:white;border-radius:50%;transition:0.2s}
input:checked+.tsl{background:#6b9e6b}
input:checked+.tsl:before{transform:translateX(12px)}
.trans-row{display:flex;align-items:center;gap:8px;padding:9px 11px;border:1px solid #ddd8d0;border-radius:6px;background:#f0ede8;cursor:pointer;margin-bottom:6px;transition:all 0.15s}
.trans-row.on{border-color:#4a8c6b;background:#e8f4ee}
.trans-lbl{font-size:11px;color:#706c68;cursor:pointer;display:flex;align-items:center;gap:8px;flex:1}
.checker{width:16px;height:16px;border-radius:3px;flex-shrink:0;background-image:linear-gradient(45deg,#ccc 25%,transparent 25%),linear-gradient(-45deg,#ccc 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#ccc 75%),linear-gradient(-45deg,transparent 75%,#ccc 75%);background-size:8px 8px;background-position:0 0,0 4px,4px -4px,-4px 0}
.share-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:9px;border:1px solid #4a8c6b;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;background:#e8f4ee;color:#2d5a40;font-family:inherit;transition:all 0.1s;margin-bottom:6px;letter-spacing:0.03em}
.share-btn:hover{background:#d8ece0}
.share-btn.copied{background:#d4e8d4;border-color:#6b9e6b;color:#2d5a2d}
.exp-btn{display:block;width:100%;padding:11px;border:1px solid #4a4642;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;background:#2a2825;color:#f4f0eb;font-family:inherit;transition:all 0.1s;text-align:center;letter-spacing:0.04em}
.exp-btn:hover{background:#4a4642}
.preview-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:16px;gap:8px;overflow-y:auto}
.cv-frame{border-radius:10px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.18);flex-shrink:0}
/* 桌機編輯模式：填滿寬度，允許捲動 */
canvas{display:block;width:calc(100vw - 380px);aspect-ratio:9/16;height:auto}
/* 手機唯讀模式：填滿螢幕高度，不捲動 */
body.readonly .preview-area{justify-content:center;overflow:hidden;padding:10px}
body.readonly canvas{width:auto;height:calc(100vh - 40px);max-width:100vw;aspect-ratio:9/16}
.hint{font-size:10px;color:#8c8780;text-align:center}
/* 雲端同步狀態列 */
.sync-bar{display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:6px;font-size:10px;margin-bottom:6px;transition:all 0.3s}
.sync-bar.ok{background:#e8f4ee;color:#2d5a40}
.sync-bar.saving{background:#fdf5e0;color:#7a5a00}
.sync-bar.offline{background:#fce8e8;color:#9a4040}
.sync-bar.idle{background:#f0ede8;color:#8c8780}
.sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sync-bar.ok .sync-dot{background:#4a8c6b}
.sync-bar.saving .sync-dot{background:#c8a000;animation:pulse 0.8s infinite}
.sync-bar.offline .sync-dot{background:#c0504a}
.sync-bar.idle .sync-dot{background:#b5b0a8}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
/* ── 唯讀模式（?ro=1）：隱藏編輯側欄，純瀏覽 ── */
body.readonly .panel{display:none}
body.readonly .wrap{justify-content:center}
body.readonly .preview-area{align-items:center;justify-content:flex-start;padding-top:30px}
body.readonly .cv-frame{box-shadow:0 4px 20px rgba(0,0,0,0.15)}
</style>
</head>
<body>
<div class="wrap">
<div class="panel">
  <div class="p-block">
    <div class="sec">品牌資訊 <span class="saved-dot" id="saved-dot"></span></div>
    <div class="field">
      <div class="field-hd"><label>店名</label><div class="sz-ctrl"><button class="sz-btn" onclick="adjSz('bname',-2)">−</button><span class="sz-val" id="sz-bname">62</span><button class="sz-btn" onclick="adjSz('bname',2)">＋</button></div></div>
      <input type="text" id="bname" value="NINIの皮膚療癒所" oninput="S.bname=this.value;draw();scheduleSave()">
    </div>
    <div class="field">
      <div class="field-hd"><label>副標題</label><div class="sz-ctrl"><button class="sz-btn" onclick="adjSz('bsub',-2)">−</button><span class="sz-val" id="sz-bsub">34</span><button class="sz-btn" onclick="adjSz('bsub',2)">＋</button></div></div>
      <input type="text" id="bsub" value="可預約時段" oninput="S.bsub=this.value;draw();scheduleSave()">
    </div>
    <div class="field" style="margin-bottom:0">
      <div class="field-hd"><label>頁尾說明</label><div class="sz-ctrl"><button class="sz-btn" onclick="adjSz('note',-2)">−</button><span class="sz-val" id="sz-note">27</span><button class="sz-btn" onclick="adjSz('note',2)">＋</button></div></div>
      <textarea id="bnote" class="note-ta" oninput="S.note=this.value;autoResize(this);draw();scheduleSave()">私訊洽詢預約 · 名額有限</textarea>
      <div class="align-row">
        <button class="align-btn" id="al-left" onclick="setAlign('left')">← 靠左</button>
        <button class="align-btn on" id="al-center" onclick="setAlign('center')">置中</button>
        <button class="align-btn" id="al-right" onclick="setAlign('right')">靠右 →</button>
      </div>
    </div>
  </div>
  <div class="p-block">
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <span class="month-title" id="mtitle"></span>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-dow" id="cdow"></div>
    <div class="cal-grid" id="cgrid"></div>
  </div>
  <div class="p-block"><div id="sc"><div class="no-sel">← 點選日期設定時段</div></div></div>
  <div class="p-block">
    <div class="sec">字體風格</div>
    <div class="font-opts" id="fnopts"></div>
  </div>
  <div class="p-block">
    <div class="sec">顏色設定</div>
    <div class="color-section"><div class="color-lbl">背景底色</div><div class="sw-row" id="sw-bg"><div class="cp-wrap" title="自訂"><input type="color" id="cp-bg" value="#c8c4be" oninput="applyC('bg',this.value,null)"></div></div></div>
    <div class="color-section"><div class="color-lbl">文字顏色</div><div class="sw-row" id="sw-tx"><div class="cp-wrap" title="自訂"><input type="color" id="cp-tx" value="#2a2825" oninput="applyC('tx',this.value,null)"></div></div></div>
    <div class="color-section" style="margin-bottom:6px"><div class="color-lbl">時段標籤底色</div><div class="sw-row" id="sw-tg"><div class="cp-wrap" title="自訂"><input type="color" id="cp-tg" value="#e8e4df" oninput="applyC('tg',this.value,null)"></div></div></div>
    <div class="color-section" style="margin-bottom:6px">
      <div class="color-lbl" style="display:flex;align-items:center;justify-content:space-between">
        <span>格線顏色</span>
        <span style="display:flex;align-items:center;gap:4px;font-size:10px;color:#8c8780">
          不透明度 <span class="sz-val" id="sz-gridop">12%</span>
          <input type="range" id="grid-op-range" min="0.02" max="0.6" step="0.02" value="0.12" style="width:60px;accent-color:#4a4642" oninput="adjGridOp(+this.value)">
        </span>
      </div>
      <div class="sw-row" id="sw-grid" style="margin-top:4px"><div class="cp-wrap" title="自訂"><input type="color" id="cp-grid" value="#2a2825" oninput="applyC('grid',this.value,null)"></div></div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:5px">
        <span style="font-size:11px;color:#706c68">線條粗細</span>
        <div class="sz-ctrl"><button class="sz-btn" onclick="adjGrid(-0.5)">−</button><span class="sz-val" id="sz-grid">1px</span><button class="sz-btn" onclick="adjGrid(0.5)">＋</button></div>
      </div>
    </div>
    <div class="color-section" style="margin-bottom:6px"><div class="color-lbl">已預約刪除線顏色</div><div class="sw-row" id="sw-sk"><div class="cp-wrap" title="自訂"><input type="color" id="cp-sk" value="#c0464a" oninput="applyC('sk',this.value,null)"></div></div></div>
    <div class="color-section" style="margin-bottom:0">
      <div class="color-lbl">自訂底圖（可選）</div>
      <div class="upload-z" onclick="document.getElementById('bgf').click()">⬆ 點擊上傳底圖</div>
      <input type="file" id="bgf" accept="image/*" style="display:none" onchange="loadBg(event)">
      <div class="ovrow"><label class="tgl"><input type="checkbox" id="ovl" checked onchange="draw()"><span class="tsl"></span></label>暗化遮罩<input type="range" id="ovop" min="0" max="80" value="30" style="flex:1" oninput="draw()"></div>
    </div>
  </div>
  <div class="p-block">
    <div class="trans-row" id="trans-row" onclick="toggleTrans()">
      <span class="trans-lbl"><span class="checker"></span>去背匯出（透明底）</span>
      <label class="tgl" onclick="event.stopPropagation()"><input type="checkbox" id="trans-chk" onchange="S.transBg=this.checked;document.getElementById('trans-row').classList.toggle('on',this.checked)"><span class="tsl"></span></label>
    </div>
    <div class="sync-bar idle" id="sync-bar">
      <span class="sync-dot"></span>
      <span id="sync-txt">連線中…</span>
    </div>
    <div style="display:flex;gap:5px;margin-bottom:6px">
      <button class="share-btn" style="margin-bottom:0;flex:1" onclick="forcePush()" title="把目前電腦的設定強制上傳覆蓋雲端">☁️ 強制上傳</button>
      <button class="share-btn" style="margin-bottom:0;flex:1" onclick="forcePull()" title="從雲端重新載入，覆蓋目前畫面">⬇ 從雲端載入</button>
    </div>
    <button class="share-btn" id="sync-btn" onclick="syncToOtherDevice()">📱 QR Code（離線備用）</button>
    <button class="exp-btn" onclick="exportPng()">匯出 IG 限時動態圖片</button>
    <div class="hint" style="margin-top:5px">1080 × 1920 px</div>
  </div>
</div>

<!-- QR Code Modal -->
<div id="qr-modal" onclick="closeQR()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;align-items:center;justify-content:center">
  <div onclick="event.stopPropagation()" style="background:#faf8f5;border-radius:14px;padding:24px 20px;width:300px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,0.25)">
    <div style="font-size:13px;font-weight:600;color:#2a2825;margin-bottom:4px">📱 手機同步</div>
    <div style="font-size:11px;color:#8c8780;margin-bottom:14px;line-height:1.6">用手機掃描下方 QR Code<br>即可在手機上看到目前最新設定</div>
    <div id="qr-wrap" style="width:220px;height:220px;margin:0 auto 14px;background:#f0ede8;border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden">
      <img id="qr-img" src="" style="width:220px;height:220px;display:block" alt="QR Code">
    </div>
    <div style="font-size:10px;color:#9a9690;margin-bottom:10px">QR Code 包含目前所有設定與劃掉記錄</div>
    <div style="display:flex;gap:6px">
      <button onclick="copyQrUrl()" id="copy-url-btn" style="flex:1;padding:9px;border:1px solid #4a8c6b;border-radius:7px;font-size:11px;cursor:pointer;background:#e8f4ee;color:#2d5a40;font-family:inherit;font-weight:500">複製連結</button>
      <button onclick="closeQR()" style="flex:1;padding:9px;border:1px solid #ddd8d0;border-radius:7px;font-size:11px;cursor:pointer;background:#f0ede8;color:#4a4642;font-family:inherit">關閉</button>
    </div>
  </div>
</div>
<div class="preview-area">
  <div style="font-size:10px;color:#8c8780;letter-spacing:0.07em;text-transform:uppercase">預覽</div>
  <div class="cv-frame"><canvas id="cv" width="1080" height="1920"></canvas></div>
  <div class="hint">IG 限時動態 · 9:16</div>
</div>
</div>
<script>
// ── 固定四時段 ──────────────────────────────────────────────────────────────
const FIXED=['11:00','13:30','16:00','18:00'];
const ZD=['日','一','二','三','四','五','六'];
const MN=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
const WBG=['#f4f0eb','#e8e4df','#d4cfc8','#c8c4be','#b5b0a8','#8c8780','#4a4642','#2a2825'];
const WTX=['#2a2825','#4a4642','#706c68','#c8c4be','#f4f0eb'];
const WTG=['#f4f0eb','#e8e4df','#d4cfc8','#c8c4be','#8c8780','#4a4642','#2a2825'];

  {id:'cormorant', label:'Cormorant Garamond', preview:'Cormorant Abc', stack:'"Cormorant Garamond",Georgia,serif'},

];

// ── 狀態 ─────────────────────────────────────────────────────────────────────
// 全新邏輯：booked[key] 儲存「已被預約」的時段（刪去法）
// 預設全部顯示，click 某時段 = 標記為已約（畫刪除線）
const S={
  bname:'NINIの皮膚療癒所', bsub:'可預約時段', note:'私訊洽詢預約 · 名額有限',
  noteAlign:'center', year:today.getFullYear(), month:today.getMonth(),
  sel:null,
  booked:{},       // { 'YYYY-MM-DD': ['11:00', '13:30', ...] }
  custom:[],       // 自訂時段
  dayStatus:{},    // { 'YYYY-MM-DD': 'closed'|'full' }
  bgColor:'#c8c4be', txColor:'#2a2825', tgColor:'#e8e4df',
  gridColor:'#2a2825', gridOpacity:0.12, gridWidth:1,
  strikeColor:'#c0464a',
  font:'ntegomin', bgImg:null, transBg:false,
  sz:{bname:62, bsub:34, note:27}
};

// ── 工具函數 ──────────────────────────────────────────────────────────────────
function gf(key,w){const f=FONTS.find(x=>x.id===S.font)||FONTS[0];const sz=typeof key==='number'?key:S.sz[key]||36;return`${w||'400'} ${sz}px ${f.stack}`}
function ctr(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(0.299*r+0.587*g+0.114*b)/255>0.55?'#2a2825':'#f4f0eb'}
function ha(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`}
function dkey(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function isBooked(k,t){return S.booked[k]?.includes(t)||false}
function getStatus(k){return S.dayStatus[k]||null}
function allSlots(){return[...FIXED,...S.custom]}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
function toggleTrans(){const chk=document.getElementById('trans-chk');chk.checked=!chk.checked;S.transBg=chk.checked;document.getElementById('trans-row').classList.toggle('on',chk.checked)}

// ── 雲端同步 API（Railway 後端）────────────────────────────────────────────
const API='https://nini-payment-tracker-production.up.railway.app/api/calendar-state';

function setSyncUI(status,text){
  const bar=document.getElementById('sync-bar');
  const txt=document.getElementById('sync-txt');
  if(!bar||!txt)return;
  bar.className='sync-bar '+status;
  txt.textContent=text;
}

// ── 儲存（先存 localStorage，再同步雲端）──────────────────────────────────
let saveTimer=null;
function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(doSave,900)}
async function doSave(){
  if(IS_RO)return;
  const p=getStateObj();
  // 1. localStorage（離線備用）
  try{localStorage.setItem('nini-booking-v2',JSON.stringify(p));}catch(e){}
  // 2. 顯示「同步中」
  setSyncUI('saving','同步中…');
  // 3. 雲端儲存
  try{
    const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});
    if(res.ok){
      setSyncUI('ok','✓ 已同步到所有裝置');
      setTimeout(()=>setSyncUI('idle','☁️ 雲端同步已連線'),2500);
      // 更新 saved dot
      const dot=document.getElementById('saved-dot');if(dot){dot.classList.add('show');setTimeout(()=>dot.classList.remove('show'),2000)}
    }else{setSyncUI('offline','⚠ 同步失敗（已本機儲存）')}
  }catch(e){
    setSyncUI('offline','📴 離線中（已本機儲存）');
  }
}

// ── 強制上傳 / 強制下載 ──────────────────────────────────────────────────────
async function forcePush(){
  if(!confirm('把目前畫面的設定上傳到雲端，覆蓋其他裝置的版本？'))return;
  setSyncUI('saving','上傳中…');
  try{
    const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(getStateObj())});
    if(res.ok){setSyncUI('ok','✓ 上傳成功！');setTimeout(()=>setSyncUI('idle','☁️ 雲端同步已連線'),2500);}
    else{setSyncUI('offline','⚠ 上傳失敗');}
  }catch(e){setSyncUI('offline','📴 無法連線到雲端');}
}
async function forcePull(){
  if(!confirm('從雲端重新載入，會覆蓋目前畫面的設定，確定嗎？'))return;
  setSyncUI('saving','載入中…');
  try{
    const res=await fetch(API,{signal:AbortSignal.timeout(6000)});
    if(res.ok){
      const p=await res.json();
      if(p&&p.bname){
        applyState(p);updateUIFromState();rCal();rSP();draw();
        setSyncUI('ok','✓ 已從雲端載入');setTimeout(()=>setSyncUI('idle','☁️ 雲端同步已連線'),2000);
      }else{setSyncUI('offline','⚠ 雲端目前沒有資料');}
    }else{setSyncUI('offline','⚠ 載入失敗');}
  }catch(e){setSyncUI('offline','📴 無法連線到雲端');}
}

// ── 載入（優先從雲端，fallback localStorage，再 fallback URL hash）──────
function applyState(p){
  if(p.sz)Object.assign(S.sz,p.sz);
  ['bname','bsub','note','noteAlign','font','bgColor','txColor','tgColor','gridColor','gridOpacity','gridWidth','strikeColor','custom','booked','dayStatus','year','month'].forEach(k=>{if(p[k]!==undefined)S[k]=p[k]});
}
async function loadPrefs(){
  // 1. 雲端（最優先）
  try{
    setSyncUI('saving','載入中…');
    const res=await fetch(API,{signal:AbortSignal.timeout(6000)});
    if(res.ok){
      const p=await res.json();
      if(p&&p.bname){applyState(p);setSyncUI('ok','✓ 已從雲端載入');setTimeout(()=>setSyncUI('idle','☁️ 雲端同步已連線'),2000);return;}
    }
  }catch(e){}
  // 2. localStorage fallback
  try{
    const saved=localStorage.getItem('nini-booking-v2');
    if(saved){const p=JSON.parse(saved);if(p&&p.bname){applyState(p);setSyncUI('offline','📴 離線中（使用本機資料）');return;}}
  }catch(e){}
  // 3. URL hash fallback
  if(loadFromHash()){setSyncUI('offline','📎 從連結載入');return;}
  setSyncUI('idle','☁️ 雲端同步已連線');
}

// ── 跨裝置同步：URL Hash 編碼 ────────────────────────────────────────────────
function getStateObj(){
  return{bname:S.bname,bsub:S.bsub,note:S.note,noteAlign:S.noteAlign,sz:{...S.sz},font:S.font,bgColor:S.bgColor,txColor:S.txColor,tgColor:S.tgColor,gridColor:S.gridColor,gridOpacity:S.gridOpacity,gridWidth:S.gridWidth,strikeColor:S.strikeColor,custom:[...S.custom],booked:{...S.booked},dayStatus:{...S.dayStatus},year:S.year,month:S.month}
}
function loadFromHash(){
  try{
    const h=location.hash;
    if(!h||h.length<10)return false;
    const p=JSON.parse(decodeURIComponent(atob(h.slice(1))));
    if(!p.bname)return false;
    if(p.sz)Object.assign(S.sz,p.sz);
    ['bname','bsub','note','noteAlign','font','bgColor','txColor','tgColor','gridColor','gridOpacity','gridWidth','strikeColor','custom','booked','dayStatus','year','month'].forEach(k=>{if(p[k]!==undefined)S[k]=p[k]});
    return true;
  }catch(e){return false}
}
function copyShareUrl(){syncToOtherDevice()}

// ── 雙向同步核心 ──────────────────────────────────────────────────────────────
// 電腦 → 手機：顯示 QR Code，掃一下開啟
// 手機 → 電腦：iOS/Android 原生分享，傳給自己再在電腦開啟
function syncToOtherDevice(){
  // 有 Railway 雲端同步，只需要乾淨的短網址
  // 手機開啟同樣網址，會自動從 Railway 載入最新資料
  const cleanUrl=location.href.split('?')[0].split('#')[0]+'?ro=1';

  const isMobile=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  if(isMobile && navigator.share){
    // 手機：用 iOS/Android 原生分享 → 傳給自己 → 電腦開啟
    navigator.share({
      title:'NINI 預約月曆',
      text:'點開連結查看最新預約時段',
      url:cleanUrl
    }).catch(()=>{
      _copyFallback(cleanUrl);
    });
  }else{
    // 電腦：顯示 QR Code 給手機掃（短網址，QR 清晰可讀）
    showQR(cleanUrl);
  }
}

// ── QR Code Modal（電腦→手機方向）────────────────────────────────────────────
let _qrUrl='';
function showQR(url){
  _qrUrl=url||location.href.split('#')[0];
  const qrApiUrl='https://api.qrserver.com/v1/create-qr-code/?size=220x220&margin=10&data='+encodeURIComponent(_qrUrl);
  document.getElementById('qr-wrap').innerHTML='<div style="color:#9a9690;font-size:11px">產生中…</div>';
  const newImg=new Image();
  newImg.onload=()=>{
    const wrap=document.getElementById('qr-wrap');
    wrap.innerHTML='';
    newImg.style.cssText='width:220px;height:220px;display:block;border-radius:6px';
    wrap.appendChild(newImg);
  };
  newImg.onerror=()=>{
    document.getElementById('qr-wrap').innerHTML=
      '<div style="font-size:10px;color:#c0504a;padding:10px;line-height:1.6">QR Code 需網路連線<br>請改用「複製連結」</div>';
  };
  newImg.src=qrApiUrl;
  document.getElementById('qr-modal').style.display='flex';
  document.getElementById('copy-url-btn').textContent='複製連結';
}
function closeQR(){
  document.getElementById('qr-modal').style.display='none';
}
function copyQrUrl(){
  _copyFallback(_qrUrl);
}
function _copyFallback(url){
  navigator.clipboard.writeText(url).then(()=>{
    const btn=document.getElementById('copy-url-btn');
    if(btn){btn.textContent='✓ 已複製！';setTimeout(()=>{btn.textContent='複製連結'},2000);}
  }).catch(()=>{prompt('複製連結後在電腦上開啟：',url)});
}

// ── 依裝置更新按鈕文字 ────────────────────────────────────────────────────────

  if(!btn)return;
  const isMobile=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

// ── 設定函數 ──────────────────────────────────────────────────────────────────
function setAlign(val){S.noteAlign=val;document.querySelectorAll('.align-btn').forEach(b=>b.classList.remove('on'));const el=document.getElementById('al-'+val);if(el)el.classList.add('on');draw();scheduleSave()}
function adjSz(key,delta){S.sz[key]=Math.max(14,Math.min(130,(S.sz[key]||27)+delta));document.getElementById('sz-'+key).textContent=S.sz[key];draw();scheduleSave()}

// ── 時段操作（刪去法核心）────────────────────────────────────────────────────
function toggleBooked(k,t){
  if(!S.booked[k])S.booked[k]=[];
  const i=S.booked[k].indexOf(t);
  if(i>=0)S.booked[k].splice(i,1);else S.booked[k].push(t);
  rSP();rCal();draw();scheduleSave()
}
function markAllBooked(){
  if(!S.sel)return;
  S.booked[S.sel]=[...allSlots()];
  rSP();rCal();draw();scheduleSave()
}
function clearAllBooked(){
  if(!S.sel)return;
  S.booked[S.sel]=[];
  rSP();rCal();draw();scheduleSave()
}
function setStatus(val){
  if(!S.sel)return;
  if(val)S.dayStatus[S.sel]=val;else delete S.dayStatus[S.sel];
  rSP();rCal();draw();scheduleSave()
}
function addC(){
  const inp=document.getElementById('ct');const t=inp.value;
  if(!t||FIXED.includes(t)||S.custom.includes(t))return;
  S.custom.push(t);S.custom.sort();
  rSP();draw();scheduleSave()
}
function rmC(t){
  S.custom=S.custom.filter(x=>x!==t);
  Object.keys(S.booked).forEach(k=>{S.booked[k]=(S.booked[k]||[]).filter(x=>x!==t)});
  rSP();draw();scheduleSave()
}
function changeMonth(d){S.month+=d;if(S.month<0){S.month=11;S.year--}if(S.month>11){S.month=0;S.year++}S.sel=null;rCal();rSP();draw();scheduleSave()}

// ── 更新 UI ───────────────────────────────────────────────────────────────────
function updateUIFromState(){
  document.getElementById('bname').value=S.bname;document.getElementById('bsub').value=S.bsub;
  const ta=document.getElementById('bnote');ta.value=S.note;autoResize(ta);

  document.getElementById('sz-grid').textContent=S.gridWidth+'px';

  document.querySelectorAll('.align-btn').forEach(b=>b.classList.remove('on'));const alEl=document.getElementById('al-'+S.noteAlign);if(alEl)alEl.classList.add('on');

// ── 迷你月曆 ──────────────────────────────────────────────────────────────────
function rCal(){
  document.getElementById('mtitle').textContent=`${S.year} 年 ${MN[S.month]}`;
  document.getElementById('cdow').innerHTML=ZD.map(d=>`<span>${d}</span>`).join('');
  const g=document.getElementById('cgrid');g.innerHTML='';
  const first=new Date(S.year,S.month,1).getDay(),dInM=new Date(S.year,S.month+1,0).getDate(),prev=new Date(S.year,S.month,0).getDate();
  const total=Math.ceil((first+dInM)/7)*7;
  for(let i=0;i<total;i++){
    const el=document.createElement('div');el.className='c-cell';
    if(i<first){el.textContent=prev-first+i+1;el.classList.add('om')}
    else if(i>=first+dInM){el.textContent=i-first-dInM+1;el.classList.add('om')}
    else{
      const d=i-first+1,key=dkey(S.year,S.month,d);el.textContent=d;
      const st=getStatus(key);
      const bkd=S.booked[key]||[];
      const tot=allSlots().length;
      if(st){
        const dot=document.createElement('div');dot.className='dot '+(st==='closed'?'dc':'df');el.appendChild(dot);
        el.classList.add('has');
      }else if(bkd.length>0){
        el.classList.add('has');
        const dot=document.createElement('div');
        dot.className='dot '+(bkd.length>=tot?'df':'dp');  // df=全滿紅, dp=部分橘
        el.appendChild(dot);
      }
      if(S.sel===key)el.classList.add('sel');
      el.onclick=()=>{S.sel=key;rCal();rSP()};
    }
    g.appendChild(el);
  }
}

// ── 側欄日期面板 ──────────────────────────────────────────────────────────────
function rSP(){
  const sc=document.getElementById('sc');
  if(!S.sel){sc.innerHTML='<div class="no-sel">← 點選日期設定時段</div>';return}
  const p=S.sel.split('-');const d=new Date(+p[0],+p[1]-1,+p[2]);
  const lbl=`${+p[1]} 月 ${+p[2]} 日（週${ZD[d.getDay()]}）`;
  const st=getStatus(S.sel);
  const bkd=S.booked[S.sel]||[];
  const slots=allSlots();

  let h=`<div class="date-hd">
    <span class="date-lbl">${lbl}</span>
    <div class="btns-row">
      <button class="sm-btn" onclick="clearAllBooked()">全開放</button>
      <button class="sm-btn red" onclick="markAllBooked()">全劃掉</button>
    </div>
  </div>`;

  // 日程狀態
  h+=`<div class="status-row">
    <div class="status-btn ${!st?'on-norm':''}" onclick="setStatus(null)">正常</div>
    <div class="status-btn ${st==='closed'?'on-closed':''}" onclick="setStatus('closed')">公休</div>
    <div class="status-btn ${st==='full'?'on-full':''}" onclick="setStatus('full')">已額滿</div>
  </div>`;

  // 時段（刪去法）
  h+=`<div class="sec">時段狀況</div>`;
  if(!st){
    h+=`<p class="slots-hint">點選時段 ＝ 標記為已預約（畫刪除線）<br>再次點選可取消</p>`;
    h+=`<div class="slots-grid">`;
    slots.forEach(t=>{
      const bk=bkd.includes(t);
      const customTag=S.custom.includes(t)?`<span class="rm" onclick="event.stopPropagation();rmC('${t}')" title="刪除此時段">×</span>`:'';
      h+=`<div class="slot-tag ${bk?'booked':'free'}" onclick="toggleBooked('${S.sel}','${t}')">
        ${t}${customTag ? '&nbsp;'+customTag : ''}
      </div>`;
    });
    h+=`</div>`;
  }else{
    h+=`<div class="slots-grid">`;
    slots.forEach(t=>{h+=`<div class="slot-tag disabled">${t}</div>`});
    h+=`</div>`;
  }

  // 自訂時段（加入）
  h+=`<div class="sec" style="margin-top:6px">加入自訂時段</div>
  <div class="crow"><input type="time" id="ct" value="09:00"><button class="add-btn" onclick="addC()">＋ 加入</button></div>`;

  sc.innerHTML=h;
}

// ── 顏色 ──────────────────────────────────────────────────────────────────────
function applyC(type,color,el){
  if(type==='bg'){S.bgColor=color;document.getElementById('cp-bg').value=color}
  else if(type==='tx'){S.txColor=color;document.getElementById('cp-tx').value=color}
  else if(type==='tg'){S.tgColor=color;document.getElementById('cp-tg').value=color}
  else if(type==='grid'){S.gridColor=color;document.getElementById('cp-grid').value=color}
  else if(type==='sk'){S.strikeColor=color;document.getElementById('cp-sk').value=color}
  if(el){const pr=el.closest('.sw-row');if(pr)pr.querySelectorAll('.sw').forEach(x=>x.classList.remove('sel'));el.classList.add('sel')}
  draw();scheduleSave();
}
function adjGrid(delta){S.gridWidth=Math.round(Math.max(0.5,Math.min(6,S.gridWidth+delta))*2)/2;document.getElementById('sz-grid').textContent=S.gridWidth+'px';draw();scheduleSave()}
function adjGridOp(val){S.gridOpacity=Math.round(val*100)/100;document.getElementById('sz-gridop').textContent=Math.round(val*100)+'%';draw();scheduleSave()}
function loadBg(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=()=>{S.bgImg=img;draw()};img.src=ev.target.result};r.readAsDataURL(f)}
function setFont(id){S.font=id;document.querySelectorAll('.font-opt').forEach(x=>x.classList.toggle('on',x.dataset.id===id));draw();scheduleSave()}

// ── Canvas 繪製（刪去法主視覺）────────────────────────────────────────────────
function draw(targetCanvas,skipBg){
  const cv=targetCanvas||document.getElementById('cv'),ctx=cv.getContext('2d');
  const W=1080,H=1920;ctx.clearRect(0,0,W,H);

  // 背景
  if(!skipBg){
    if(S.bgImg){
      const ir=S.bgImg.width/S.bgImg.height,cr=W/H;let sx,sy,sw,sh;
      if(ir>cr){sh=S.bgImg.height;sw=sh*cr;sx=(S.bgImg.width-sw)/2;sy=0}else{sw=S.bgImg.width;sh=sw/cr;sx=0;sy=(S.bgImg.height-sh)/2}
      ctx.drawImage(S.bgImg,sx,sy,sw,sh,0,0,W,H);
      if(document.getElementById('ovl').checked){const op=parseInt(document.getElementById('ovop').value)/100;ctx.fillStyle=`rgba(0,0,0,${op})`;ctx.fillRect(0,0,W,H)}
    }else{ctx.fillStyle=S.bgColor;ctx.fillRect(0,0,W,H)}
  }

  const cT=S.txColor,cS=ha(cT,.68),cA=ha(cT,.45),cL=ha(cT,.18),cG=ha(S.gridColor,S.gridOpacity);

  // 品牌區
  hl(ctx,80,230,1000,230,cL,1);
  ctx.save();ctx.font=gf('bname','500');ctx.fillStyle=cT;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(S.bname,W/2,316);ctx.restore();
  ctx.save();ctx.font=gf('bsub','300');ctx.fillStyle=cS;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(S.bsub,W/2,390);ctx.restore();
  hl(ctx,80,428,1000,428,cL,1);

  // 星期標題
  const cw=Math.floor(900/7);
  ZD.forEach((d,i)=>{ctx.save();ctx.font=gf(26,'300');ctx.fillStyle=cS;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(d,90+i*cw+cw/2,464);ctx.restore()});

  // 月曆格線
  const gY=490,first=new Date(S.year,S.month,1).getDay(),dInM=new Date(S.year,S.month+1,0).getDate();
  const rows=Math.ceil((first+dInM)/7),cellH=Math.floor((1710-gY)/rows);
  for(let r=0;r<=rows;r++) hl(ctx,90,gY+r*cellH,90+7*cw,gY+r*cellH,cG,S.gridWidth);
  for(let c=0;c<=7;c++) vl(ctx,90+c*cw,gY,90+c*cw,gY+rows*cellH,cG,S.gridWidth);

  // 每一天
  const slots=allSlots();
  const nSlots=slots.length;

  for(let day=1;day<=dInM;day++){
    const idx=first+day-1,col=idx%7,row=Math.floor(idx/7);
    const cx=90+col*cw,cy=gY+row*cellH,key=dkey(S.year,S.month,day);
    const st=getStatus(key);
    const bkd=S.booked[key]||[];
    const anyBooked=bkd.length>0;
    const allBooked=bkd.length>=nSlots;

    // 日期數字顏色：有劃掉時用深色，全劃掉時偏暗
    const dnColor=st?cA:allBooked?cA:anyBooked?cT:cS;
    ctx.save();ctx.font=gf((st||anyBooked)?30:26,st||anyBooked?'500':'300');ctx.fillStyle=dnColor;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(day,cx+cw/2,cy+20);ctx.restore();

    if(st){
      // 公休 / 已額滿 badge
      const label=st==='closed'?'公休':'已額滿',bx=cx+8,by=cy+38,bw=cw-16,bh=cellH-50;
      ctx.save();rr(ctx,bx,by,bw,bh,10);ctx.fillStyle=st==='closed'?ha(cT,0.08):ha(cT,0.15);ctx.fill();ctx.font=gf(Math.min(22,bh/2),'400');ctx.fillStyle=st==='closed'?cS:cT;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,bx+bw/2,by+bh/2);ctx.restore();
    }else{
      // ── 所有時段都顯示，刪去法 ──
      const margin=6,gap=3,dateH=38;
      const pw=cw-margin*2;
      const availH=cellH-dateH-gap*(nSlots-1)-8;
      const ph=Math.max(18,Math.min(46,Math.floor(availH/nSlots)));
      const slotFontSz=Math.min(18,ph-8);

      slots.forEach((t,i)=>{
        const px=cx+margin,py=cy+dateH+i*(ph+gap);
        const booked=bkd.includes(t);

        ctx.save();
        if(booked){
          // 已約：只有文字 + 刪除線，無底色
          ctx.font=gf(slotFontSz,'500');ctx.fillStyle=ha(S.strikeColor,0.55);ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t,px+pw/2,py+ph/2);
          // 刪除線
          const tw=ctx.measureText(t).width;
          ctx.strokeStyle=ha(S.strikeColor,0.70);ctx.lineWidth=Math.max(1.5,slotFontSz*0.08);
          ctx.beginPath();ctx.moveTo(px+pw/2-tw/2-2,py+ph/2);ctx.lineTo(px+pw/2+tw/2+2,py+ph/2);ctx.stroke();
        }else{
          // 可約：正常底色
          rr(ctx,px,py,pw,ph,6);ctx.fillStyle=S.tgColor;ctx.fill();
          ctx.font=gf(slotFontSz,'500');ctx.fillStyle=ctr(S.tgColor);ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t,px+pw/2,py+ph/2);
        }
        ctx.restore();
      });
    }
  }

  // 頁尾分隔線 & 說明文字
  hl(ctx,80,gY+rows*cellH+18,1000,gY+rows*cellH+18,cL,1);
  const fLines=S.note.split('\n'),fLH=S.sz.note*1.45,fBaseY=gY+rows*cellH+68;
  const fStartY=fBaseY-(fLines.length*fLH-fLH)/2;
  let fX,fTA;
  if(S.noteAlign==='left'){fX=100;fTA='left'}else if(S.noteAlign==='right'){fX=980;fTA='right'}else{fX=W/2;fTA='center'}
  ctx.save();ctx.font=gf('note','300');ctx.fillStyle=cS;ctx.textAlign=fTA;ctx.textBaseline='middle';fLines.forEach((line,i)=>ctx.fillText(line,fX,fStartY+i*fLH));ctx.restore();
}

// ── 畫布輔助 ──────────────────────────────────────────────────────────────────
function hl(ctx,x1,y,x2,y2,c,w){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(x1,y);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}
function vl(ctx,x,y1,x2,y2,c,w){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(x,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}

// ── 匯出 ─────────────────────────────────────────────────────────────────────
function exportPng(){
  let cv;
  if(S.transBg){cv=document.createElement('canvas');cv.width=1080;cv.height=1920;draw(cv,true);}
  else{cv=document.getElementById('cv')}
  const suffix=S.transBg?'_去背':'';
  const a=document.createElement('a');a.href=cv.toDataURL('image/png');
  a.download=`預約月曆_${S.year}-${String(S.month+1).padStart(2,'0')}${suffix}.png`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

// ── 色票 & 字體 ───────────────────────────────────────────────────────────────
function buildSW(id,arr,type){const c=document.getElementById(id),cp=c.querySelector('.cp-wrap');arr.forEach((col,i)=>{const d=document.createElement('div');d.className='sw'+(i===0?' sel':'');d.style.background=col;d.onclick=()=>applyC(type,col,d);c.insertBefore(d,cp)})}
function buildFonts(){const c=document.getElementById('fnopts');c.innerHTML='';FONTS.forEach(f=>{const d=document.createElement('div');d.className='font-opt'+(f.id===S.font?' on':'');d.dataset.id=f.id;d.innerHTML=`<span class="fn" style="font-family:${f.stack}">${f.label}</span><span class="fp">${f.preview}</span>`;d.onclick=()=>setFont(f.id);c.appendChild(d)})}

// ── 初始化 ───────────────────────────────────────────────────────────────────
async function init(){
  if(IS_RO){
    document.body.classList.add('readonly');
    document.title='NINI 預約月曆';
  }else{
    buildSW('sw-bg',WBG,'bg');buildSW('sw-tx',WTX,'tx');buildSW('sw-tg',WTG,'tg');buildSW('sw-grid',WGR,'grid');buildSW('sw-sk',WSK,'sk');buildFonts();
  }
  await loadPrefs();  // 等雲端載入完再畫面
  if(!IS_RO)updateUIFromState();
  rCal();rSP();draw();
  if(!IS_RO)updateSyncBtnLabel();
}
document.fonts.ready.then(()=>init());
</script>
